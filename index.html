/* Sıralama hook'u — tüm tablolarda kullanılır */
function useSortable(data, defaultKey, defaultDir) {
  var _sk=useState(defaultKey||null); var sortKey=_sk[0]; var setSortKey=_sk[1];
  var _sd=useState(defaultDir||"desc"); var sortDir=_sd[0]; var setSortDir=_sd[1];
  function toggleSort(key){
    if(sortKey===key){ setSortDir(function(d){return d==="asc"?"desc":"asc";}); }
    else{ setSortKey(key); setSortDir("desc"); }
  }
  var sorted = useMemo(function(){
    if(!sortKey) return data;
    return (data||[]).slice().sort(function(a,b){
      var av=a[sortKey]; var bv=b[sortKey];
      if(av===undefined||av===null) av="";
      if(bv===undefined||bv===null) bv="";
      var n=Number(av); var m=Number(bv);
      var cmp = (!isNaN(n)&&!isNaN(m)) ? n-m : String(av).localeCompare(String(bv),"tr");
      return sortDir==="asc" ? cmp : -cmp;
    });
  }, [data, sortKey, sortDir]);
  function SortTh(thProps){
    var active = sortKey===thProps.k;
    return <th style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"}} onClick={function(){toggleSort(thProps.k);}}>
      {thProps.children}
      <span style={{marginLeft:3,fontSize:9,opacity:active?1:0.3}}>
        {active&&sortDir==="asc"?"▲":"▼"}
      </span>
    </th>;
  }
  return {sorted:sorted, toggleSort:toggleSort, sortKey:sortKey, sortDir:sortDir, SortTh:SortTh};
}

var API_URL = "https://script.google.com/macros/s/AKfycbyoQkLvnNz1ozTXDsyXWVR1qPRrgLhPDWo_d3Hu2v5Fq6BqD8_P189KBkL59FhDbry6/exec";

function apiGetAll() {
  return fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action:"getAll" })
  }).then(function(r){ return r.json(); });
}
function apiAdd(sheet, data) {
  return fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action:"add", sheet:sheet, data:data })
  }).then(function(r){ return r.json(); });
}
function apiUpdate(sheet, id, data) {
  return fetch(API_URL, {
    method: "POST",

    body: JSON.stringify({ action:"update", sheet:sheet, id:id, data:data })
  }).then(function(r){ return r.json(); });

/* Tarihleri normalize et: Sheets bazen ISO datetime döndürür (2024-01-14T21:00:00.000Z),
   biz YYYY-MM-DD formatında karşılaştırma yapıyoruz. */
function normDate(d){
  if(!d) return d;
  if(typeof d === "string" && d.indexOf("T")>=0) return d.split("T")[0];
  return d;
}
function normalizeRecord(obj, dateFields){
  var copy = Object.assign({}, obj);
  dateFields.forEach(function(f){ if(copy[f]) copy[f] = normDate(copy[f]); });
  return copy;
}

function ls(key, def) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; }
}
function lss(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
}
function useLS(key, def) {
  var _s = useState(function(){ return ls(key, def); });
  var val = _s[0]; var setValRaw = _s[1];
  var setVal = useCallback(function(v){
    setValRaw(function(prev){
      var next = typeof v === "function" ? v(prev) : v;
      lss(key, next);
      return next;
    });
  }, [key]);
  return [val, setVal];
}

function daysUntil(d){ return Math.round((new Date(d)-new Date())/(864e5)); }
function calcPrice(cost, c){
  return cost/(1-c.ciroPrimi/100)/(1-c.maturity*0.05)/(1+c.iskonto/100);
}
function initials(name){ return name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase(); }

/* Karlılık (%) = (satış fiyatı / alış fiyatı - 1) * 100 */
function profitPct(salePrice, cost){
  if(!cost) return 0;
  return (salePrice/cost - 1) * 100;
}
function weightedProfit(salesArr){
  var totalCost=0, totalRev=0;
  salesArr.forEach(function(s){ totalCost += s.cost*s.qty; totalRev += s.price*s.qty; });
  if(totalCost===0) return 0;
  return (totalRev/totalCost - 1) * 100;
}
/* Vadesi: satış tarihi + müşteri vadesi (ay) = ödeme son tarihi */
function dueDateOf(sale, customer){
  var d = new Date(sale.date);
  d.setMonth(d.getMonth() + (customer ? customer.maturity : 0));
  return d;
}
function isOverdue(sale, customer){
  if(sale.paymentStatus==="paid") return false;
  var due = dueDateOf(sale, customer);
  return new Date() > due;
}
function overdueDays(sale, customer){
  var due = dueDateOf(sale, customer);
  return Math.round((new Date()-due)/864e5);
}
/* Müşterinin açık hesap toplamı (ödenmemiş satışlar) */
function openBalance(customerId, sales){
  return sales.filter(function(s){ return s.customerId===customerId && s.paymentStatus==="open"; })
    .reduce(function(a,s){ return a + s.price*s.qty; }, 0);
}
function overdueBalance(customerId, sales, customer){
  return sales.filter(function(s){ return s.customerId===customerId && s.paymentStatus==="open" && isOverdue(s,customer); })
    .reduce(function(a,s){ return a + s.price*s.qty; }, 0);
}
function fmtTL(n){ return "₺"+Math.round(n).toLocaleString("tr"); }
var TR_MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
function monthLabel(key){
  /* key formatı "YYYY-MM" */
  var parts = key.split("-");
  var y = parts[0]; var mIdx = parseInt(parts[1],10)-1;
  return TR_MONTHS[mIdx] + " " + y;
}

function Login(props) {
  var users = props.users || [];
  var _e = useState(""); var email = _e[0]; var setEmail = _e[1];
  var _p = useState(""); var pwd = _p[0]; var setPwd = _p[1];
  var _r = useState(""); var err = _r[0]; var setErr = _r[1];
  function go(){
    var u = users.find(function(x){ return x.email===email && String(x.password)===String(pwd); });
    if(u){ props.onLogin(u); } else { setErr("E-posta veya şifre hatalı."); }
  }
  if(props.loading){
    return (
      <div className="lwrap">
        <div className="lcard" style={{textAlign:"center"}}>

    );
  }
  if(props.loadError){
    return (
      <div className="lwrap">
        <div className="lcard">
          <h2>Bağlantı Hatası</h2>
          <p style={{color:"var(--txD)",fontSize:13,marginBottom:16}}>{props.loadError}</p>
          <button className="btn btnP" style={{width:"100%",justifyContent:"center"}} onClick={props.onRetry}><i className="ti ti-refresh" aria-hidden="true"/>Tekrar Dene</button>
        </div>
      </div>
    );
  }
  return (
    <div className="lwrap">
      <div className="lcard">
        <h2>Stok Yönetim Sistemi</h2>
        <p style={{color:"var(--tx2)",fontSize:13,marginBottom:24}}>Hesabınızla giriş yapın</p>
        <div className="fg"><label className="fl">E-posta</label><input value={email} onChange={function(e){setEmail(e.target.value);}} type="email" placeholder="email@sirket.com"/></div>
        <div className="fg"><label className="fl">Şifre</label><input type="password" value={pwd} onChange={function(e){setPwd(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")go();}} placeholder="••••••••"/></div>
        {err&&<p style={{color:"var(--txD)",fontSize:12,marginBottom:8}}>{err}</p>}
        <button className="btn btnP" style={{width:"100%",justifyContent:"center"}} onClick={go}>Giriş Yap</button>
        <div style={{marginTop:20,padding:14,background:"var(--bg2)",borderRadius:"var(--r)"}}>

              <span>{u.email}</span>

}

/* ── DASHBOARD ── */
function Dashboard(props) {
  var products=props.products; var lots=props.lots; var sales=props.sales; var customers=props.customers||[];
  var now = new Date();
  var ago90 = new Date(now - 90*864e5);
  var totalStock = lots.reduce(function(a,l){return a+l.remaining;},0);
  var totalVal   = lots.reduce(function(a,l){return a+l.remaining*l.cost;},0);
  var exp90 = lots.filter(function(l){var d=daysUntil(l.expiryDate);return d>=0&&d<90;}).length;
  var nearLots = lots.slice().sort(function(a,b){return new Date(a.expiryDate)-new Date(b.expiryDate);}).filter(function(l){return daysUntil(l.expiryDate)<180;}).slice(0,8);

  /* Ay bazında toplam karlılık: satış tarihine göre YYYY-MM grupla */
  var monthKeys = [];
  var monthMap = {};
  sales.forEach(function(s){
    var key = s.date.slice(0,7); // "2024-03"
    if(!monthMap[key]){ monthMap[key]={cost:0,rev:0,qty:0}; monthKeys.push(key); }
    monthMap[key].cost += s.cost*s.qty;
    monthMap[key].rev  += s.price*s.qty;
    monthMap[key].qty  += s.qty;
  });
  monthKeys.sort();
  var monthlyProfit = monthKeys.map(function(k){
    var m = monthMap[k];
    var pct = m.cost>0 ? (m.rev/m.cost-1)*100 : 0;
    return { key:k, label:monthLabel(k), cost:m.cost, rev:m.rev, profit:m.rev-m.cost, pct:pct, qty:m.qty };
  });
  var maxAbsProfit = Math.max(1, Math.max.apply(null, monthlyProfit.map(function(m){return Math.abs(m.profit);})));

  /* Aylık açık hesaptan gelecek ödemeler: vade tarihine (dueDateOf) göre YYYY-MM grupla */
  var openSales = sales.filter(function(s){return s.paymentStatus==="open";});
  var dueMap = {};
  var dueKeys = [];
  openSales.forEach(function(s){
    var cust = customers.find(function(c){return c.id===s.customerId;});
    var due = dueDateOf(s, cust);
    var key = due.toISOString().slice(0,7);
    if(!dueMap[key]){ dueMap[key]={amount:0,count:0,overdue:0}; dueKeys.push(key); }
    dueMap[key].amount += s.price*s.qty;
    dueMap[key].count  += 1;
    if(due < now) dueMap[key].overdue += s.price*s.qty;
  });
  dueKeys.sort();
  var monthlyCollections = dueKeys.map(function(k){
    var m = dueMap[k];
    return { key:k, label:monthLabel(k), amount:m.amount, count:m.count, overdue:m.overdue, isPast: k < now.toISOString().slice(0,7) };
  });
  var maxCollection = Math.max(1, Math.max.apply(null, monthlyCollections.map(function(m){return m.amount;})));

  return (
    <div>
      <div className="g4 mb4">
        {[
          {lbl:"Aktif Ürün",val:products.length,sub:"farklı SKU",ico:"ti-package"},
          {lbl:"Toplam Stok",val:totalStock.toLocaleString("tr"),sub:"adet",ico:"ti-box"},
          {lbl:"Stok Değeri",val:"₺"+Math.round(totalVal/1000)+"K",sub:"maliyet",ico:"ti-currency-lira"},
          {lbl:"SKT Yaklaşan",val:exp90,sub:"90 gün içinde",ico:"ti-alert-triangle"}
        ].map(function(s,i){return(
          <div key={i} className="sc">
            <i className={"ti "+s.ico} style={{fontSize:22,display:"block",marginBottom:6,color:"var(--tx2)"}} aria-hidden="true"/>
            <div className="lbl">{s.lbl}</div>
            <div className="val">{s.val}</div>
            <div className="sub">{s.sub}</div>
          </div>
        );})}
      </div>

      <div className="g2 mb4">
        <div className="card">
          <div className="ct">Ay Bazında Toplam Karlılık</div>
          {monthlyProfit.length===0&&<div className="empty" style={{padding:20}}><p>Satış kaydı yok</p></div>}
          {monthlyProfit.length>0&&<div className="tw"><table>
            <thead><tr><th>Ay</th><th>Ciro</th><th>Maliyet</th><th>Net Kâr</th><th>Karlılık</th></tr></thead>
            <tbody>{monthlyProfit.map(function(m){
              var cls = m.pct>=25?"bs":m.pct>=10?"bw":"bd_";
              return(<tr key={m.key}>
                <td style={{fontWeight:500}}>{m.label}</td>
                <td style={{fontSize:12}}>{fmtTL(m.rev)}</td>
                <td style={{fontSize:12}}>{fmtTL(m.cost)}</td>
                <td style={{fontSize:12,fontWeight:500}}>{fmtTL(m.profit)}</td>
                <td>
                  <div className="fx g2g">
                    <span className={"badge "+cls}>%{m.pct.toFixed(1)}</span>
                    <div className="vbar" style={{maxWidth:60}}><div className="vfill" style={{width:Math.min(100,Math.abs(m.profit)/maxAbsProfit*100)+"%"}}/></div>
                  </div>
                </td>
              </tr>);
            })}</tbody>
          </table></div>}
        </div>

        <div className="card">
          <div className="ct">Aylık Açık Hesap Tahsilat Beklentisi</div>
          {monthlyCollections.length===0&&<div className="empty" style={{padding:20}}><p>Açık hesap yok</p></div>}
          {monthlyCollections.length>0&&<div className="tw"><table>
            <thead><tr><th>Vade Ayı</th><th>Bekleyen</th><th>İşlem</th><th>Durum</th></tr></thead>
            <tbody>{monthlyCollections.map(function(m){
              return(<tr key={m.key}>
                <td style={{fontWeight:500}}>{m.label}</td>
                <td style={{fontSize:13,fontWeight:500}}>{fmtTL(m.amount)}</td>
                <td style={{fontSize:12}}>{m.count} kayıt</td>
                <td>{m.isPast?<span className="badge bd_">Gecikmiş</span>:<span className="badge bi">Beklenen</span>}</td>
              </tr>);
            })}</tbody>
          </table></div>}
          {monthlyCollections.length>0&&<div className="infobox ibI mt3" style={{fontSize:11}}>
            Toplam bekleyen açık hesap: <strong>{fmtTL(openSales.reduce(function(a,s){return a+s.qty*s.price;},0))}</strong>
          </div>}
        </div>
      </div>

      <div className="g2">
        <div className="card">
          <div className="ct">Stok Devir Hızı — Son 3 Ay</div>
          <div className="tw"><table>
            <thead><tr><th>Ürün</th><th>Stok</th><th>Satış</th><th>Devir</th></tr></thead>
            <tbody>{products.map(function(p){
              var stock=lots.filter(function(l){return l.productId===p.id;}).reduce(function(a,l){return a+l.remaining;},0);
              var sold=sales.filter(function(s){return s.productId===p.id&&new Date(s.date)>=ago90;}).reduce(function(a,s){return a+s.qty;},0);
              var vel=sold>0?(stock/sold).toFixed(1):"∞";
              var pct=sold>0?Math.min(100,stock/sold*50):0;
              return(<tr key={p.id}>
                <td style={{fontWeight:500}}>{p.modelNo}</td><td>{stock}</td><td>{sold}</td>
                <td><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{minWidth:28,fontSize:12}}>{vel}x</span><div className="vbar"><div className="vfill" style={{width:pct+"%"}}/></div></div></td>
              </tr>);
            })}</tbody>
          </table></div>
        </div>
        <div className="card">
          <div className="ct">SKT Takvimi</div>
          <div className="tw"><table>
            <thead><tr><th>LOT</th><th>Ürün</th><th>SKT</th><th>Gün</th><th>Durum</th></tr></thead>
            <tbody>
              {nearLots.length===0&&<tr><td colSpan={5}><div className="empty"><p>Yaklaşan SKT yok</p></div></td></tr>}
              {nearLots.map(function(l){
                var p=products.find(function(x){return x.id===l.productId;});
                var d=daysUntil(l.expiryDate);
                var cls=d<0||d<30?"bd_":d<90?"bw":"bs";
                var txt=d<0?"Süresi Doldu":d<30?"Kritik":d<90?"Yaklaşıyor":"Bu Yıl";
                return(<tr key={l.id}>
                  <td><span className="badge bi" style={{fontSize:10}}>{l.lotNo}</span></td>
                  <td style={{fontSize:12}}>{p&&p.modelNo}</td>
                  <td style={{fontSize:12}}>{l.expiryDate}</td>
                  <td style={{fontSize:12,fontWeight:500,color:d<30?"var(--txD)":"inherit"}}>{d<0?"-"+Math.abs(d):d}</td>
                  <td><span className={"badge "+cls}>{txt}</span></td>
                </tr>);
              })}
            </tbody>
          </table></div>
        </div>
      </div>
    </div>
  );
}

/* ── STOK LİSTESİ ── */
function StockList(props) {
  var _q=useState(""); var q=_q[0]; var setQ=_q[1];
  var _c=useState("Tümü"); var cat=_c[0]; var setCat=_c[1];
  var _s=useState(null); var sel=_s[0]; var setSel=_s[1];
  var _stockSort=useState("desc"); var stockSort=_stockSort[0]; var setStockSort=_stockSort[1];
  var ago90=new Date(new Date()-90*864e5);

  /* Eşleştirme map: systemProductId → esl kaydı */
  var eslById = {};
  /* Eşleştirme map: systemModelNo (küçük harf) → [esl kayıtları] */
  var eslByModel = {};
  (props.eslestirme||[]).forEach(function(e){
    if(!e.systemProductId || String(e.systemProductId).indexOf("M:")===0) return;
    eslById[String(e.systemProductId)] = e;
    var mn = String(e.systemModelNo||"").trim().toLowerCase();
    if(mn){ if(!eslByModel[mn]) eslByModel[mn]=[]; eslByModel[mn].push(e); }
  });

  /* Paraşüt ürün stoklarını model no bazında topla:
     ParasutUrunler sayfasındaki stock alanını kullan */
  var parasutStockByModel = {};
  (props.parasutUrunler||[]).forEach(function(pu){
    /* Bu Paraşüt ürününün eşleştiği system model no'yu bul */
    var pName = String(pu.name||"");
    var matchEsl = (props.eslestirme||[]).find(function(e){
      return String(e.parasutName||"")===pName;
    });
    if(!matchEsl) return;
    var mn = String(matchEsl.systemModelNo||"").trim().toLowerCase();
    if(!mn) return;
    if(!parasutStockByModel[mn]) parasutStockByModel[mn]=0;
    parasutStockByModel[mn] += Number(pu.stock)||0;
  });

  /* Ürünleri eşleştirme tablosundan zenginleştir */
  var enrichedProducts = props.products.map(function(p){
    var esl = eslById[String(p.id)];
    var mn = String(p.modelNo||"").trim().toLowerCase();
    var mnFromEsl = esl ? String(esl.systemModelNo||"").trim().toLowerCase() : mn;
    var parasutStock = parasutStockByModel[mnFromEsl] || parasutStockByModel[mn] || null;
    return Object.assign({}, p, {
      displayCategory: esl ? (esl.category||p.category||"—") : (p.category||"—"),
      displayModelNo:  esl ? (esl.systemModelNo||p.modelNo) : p.modelNo,
      parasutStock:    parasutStock
    });
  });

  /* Sadece Paraşüt stoğu olan ürünleri göster (eşleştirilmiş olanlar) */
  var cats=["Tümü"].concat(Array.from(new Set(
    enrichedProducts.filter(function(p){return p.parasutStock!==null;})
      .map(function(p){return p.displayCategory;}).filter(function(c){return c&&c!=="—";})
  )));

  var filtered=enrichedProducts.filter(function(p){
    if(p.parasutStock===null) return false;
    var qq=q.toLowerCase();
    return(String(p.modelNo||"").toLowerCase().includes(qq)||String(p.skuId||"").toLowerCase().includes(qq)||String(p.ean||"").includes(qq)||String(p.description||"").toLowerCase().includes(qq)||String(p.displayModelNo||"").toLowerCase().includes(qq))
      &&(cat==="Tümü"||p.displayCategory===cat);
  }).sort(function(a,b){
    return stockSort==="desc" ? (b.parasutStock||0)-(a.parasutStock||0) : (a.parasutStock||0)-(b.parasutStock||0);
  });

  function upd(id,ch){ props.onUpdateProduct(id, ch); setSel(function(prev){return prev&&prev.id===id?Object.assign({},prev,ch):prev;}); }

  return (
    <div>
      <div className="fxb mb3" style={{gap:8,flexWrap:"wrap"}}>
        <div className="fx g2g" style={{flex:1,minWidth:200}}>
          <div className="swrap" style={{flex:1,maxWidth:340}}>
            <i className="ti ti-search si" aria-hidden="true"/>
            <input placeholder="Model, SKU, EAN ara..." value={q} onChange={function(e){setQ(e.target.value);}}/>
          </div>
          <select value={cat} onChange={function(e){setCat(e.target.value);}} style={{width:"auto",minWidth:120}}>
            {cats.map(function(c){return <option key={c}>{c}</option>;})}
          </select>
        </div>
        {(props.role==="admin"||props.role==="entry")&&<div className="fx g2g">
          <button className="btn btnP" onClick={props.onAddProduct}><i className="ti ti-plus" aria-hidden="true"/>Yeni Ürün</button>
          <button className="btn" onClick={props.onAddLot}><i className="ti ti-truck-delivery" aria-hidden="true"/>Stok Girişi</button>
        </div>}
      </div>
      {filtered.length===0&&enrichedProducts.filter(function(p){return p.parasutStock!==null;}).length===0&&
        <div className="infobox ibW mb3" style={{fontSize:12}}>Paraşüt'ten eşleştirilmiş ürün bulunamadı. Entegrasyonlar → Ürün Senkronizasyonu yapın, ardından Ürün Eşleştirme sayfasından eşleştirin.</div>
      }
      <div className="card" style={{padding:0}}><div className="tw"><table>
        <thead><tr>
          <th style={{width:54}}>Görsel</th>
          <th>Model No</th>
          <th>SKU ID</th>
          <th>Kategori</th>
          <th style={{cursor:"pointer",userSelect:"none"}} onClick={function(){setStockSort(function(d){return d==="desc"?"asc":"desc";});}}>
            Paraşüt Stok <span style={{fontSize:9}}>{stockSort==="desc"?"▼":"▲"}</span>
          </th>
          <th>Devir (3ay)</th>
          <th>Durum</th>
          <th></th>
        </tr></thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={8}><div className="empty"><i className="ti ti-package"/><p>Ürün bulunamadı</p></div></td></tr>}
          {filtered.map(function(p){
            var pSales=props.sales.filter(function(s){return String(s.productId)===String(p.id);});
            var sold=pSales.filter(function(s){return new Date(s.date)>=ago90;}).reduce(function(a,s){return a+Number(s.qty||0);},0);
            var stock = p.parasutStock||0;
            var vel=sold>0?(stock/sold).toFixed(1)+"x":"∞";
            var cls=stock===0?"bd_":stock<10?"bw":"bs";
            var txt=stock===0?"Tükendi":stock<10?"Kritik":"Normal";
            return(<tr key={p.id} style={{cursor:"pointer"}} onClick={function(){setSel(p);}}>
              <td>{p.images&&p.images.length>0?<img src={p.images[0]} className="pimg" alt={p.displayModelNo}/>:<div className="pip"><i className="ti ti-photo" style={{fontSize:18,color:"var(--tx3)"}} aria-hidden="true"/></div>}</td>
              <td style={{fontWeight:500}}>{p.displayModelNo}<div style={{fontSize:10,color:"var(--tx3)"}}>{p.skuId!==p.displayModelNo?p.skuId:""}</div></td>
              <td><span className="tc txs">{p.skuId}</span></td>
              <td><span className="badge bi">{p.displayCategory}</span></td>
              <td>
                <strong style={{fontSize:15}}>{stock}</strong> <span className="tc txs">ad</span>
                {p.parasutStock>0&&<div style={{fontSize:10,color:"var(--tx3)"}}>Paraşüt</div>}
              </td>
              <td><span className="ts">{vel}</span></td>
              <td><span className={"badge "+cls}>{txt}</span></td>
              <td><button className="btn bxs" onClick={function(e){e.stopPropagation();setSel(p);}}><i className="ti ti-eye" aria-hidden="true"/></button></td>
            </tr>);
          })}

    var openBal = openBalance(cust.id, sales);
    var newTotal = +fm.qty * +fm.price;
    var limit = cust.riskLimit || 1000000;

    /* 2.1.2: vadesi geçmiş borç varsa uyar */
    if(overdueBal > 0){
      setWarn({type:"overdue", amount:overdueBal, cust:cust});
      return;
    }
    /* 2.1.3: risk limiti aşılıyorsa uyar */
    if(openBal + newTotal > limit){
      setWarn({type:"risk", amount:openBal+newTotal, limit:limit, cust:cust});
      return;
    }
    doSubmit();
  }

  var _busy=useState(false); var busy=_busy[0]; var setBusy=_busy[1];
  function doSubmit(){
    var pl = lots.filter(function(l){return l.productId===+fm.productId;}).sort(function(a,b){return new Date(a.entryDate)-new Date(b.entryDate);})[0];
    var cost = pl ? pl.cost : 0;
    setBusy(true);
    props.onAdd({
      id:Date.now(), productId:+fm.productId, customerId:+fm.customerId, sellerId:+fm.sellerId||props.currentUserId,
      qty:+fm.qty, price:+fm.price, cost:cost, date:new Date().toISOString().split("T")[0],
      paymentStatus: fm.paymentMethod==="acikhesap" ? "open" : "paid",
      paymentDate: fm.paymentMethod==="acikhesap" ? "" : new Date().toISOString().split("T")[0],
      paymentMethod: fm.paymentMethod==="acikhesap" ? "" : fm.paymentMethod
    }).then(function(){ setBusy(false); }).catch(function(){ setBusy(false); });
  }

  return (
    <div className="ov" onClick={props.onClose}>
      <div className="modal" onClick={function(e){e.stopPropagation();}}>
        <div className="mt_"><span>Yeni Sipariş / Satış</span><button className="btn bsm" onClick={props.onClose}><i className="ti ti-x" aria-hidden="true"/></button></div>

        {!warn&&<>
          <div className="fg"><label className="fl">Müşteri *</label>
            <select value={fm.customerId} onChange={s("customerId")}><option value="">Seçin...</option>{customers.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}</select>
          </div>
          {selCust&&<div className="infobox ibI mb3" style={{fontSize:11}}>
            Açık hesap: {fmtTL(openBalance(selCust.id,sales))} / Risk limiti: {fmtTL(selCust.riskLimit||1000000)}
          </div>}
          <div className="g2">
            <div className="fg"><label className="fl">Ürün *</label>
              <select value={fm.productId} onChange={s("productId")}><option value="">Seçin...</option>{products.map(function(p){return <option key={p.id} value={p.id}>{p.modelNo}</option>;})}</select>
            </div>
            <div className="fg"><label className="fl">Satıcı</label>
              <select value={fm.sellerId} onChange={s("sellerId")}><option value="">Ben</option>{users.filter(function(u){return u.role!=="entry";}).map(function(u){return <option key={u.id} value={u.id}>{u.name}</option>;})}</select>
            </div>
            <div className="fg"><label className="fl">Miktar *</label><input type="number" min={1} value={fm.qty} onChange={s("qty")}/></div>
            <div className="fg"><label className="fl">Birim Satış Fiyatı (₺) *</label><input type="number" min={0} step="0.01" value={fm.price} onChange={s("price")}/></div>
          </div>
          <div className="fg"><label className="fl">Ödeme Yöntemi</label>
            <select value={fm.paymentMethod} onChange={s("paymentMethod")}>
              <option value="acikhesap">Açık Hesap (Vadeli)</option>
              <option value="havale">Havale / EFT</option>
              <option value="kredikarti">Kredi Kartı</option>
              <option value="nakit">Nakit</option>
            </select>
          </div>
          <div className="fxb"><button className="btn" onClick={props.onClose}>İptal</button><button className="btn btnP" onClick={checkAndSubmit} disabled={busy}>{busy?<i className="ti ti-refresh spin" aria-hidden="true"/>:<i className="ti ti-check" aria-hidden="true"/>}Siparişi Kaydet</button></div>
        </>}

        {warn&&warn.type==="overdue"&&<div>
          <div className="infobox ibW mb3"><i className="ti ti-alert-triangle" aria-hidden="true"/> <strong>{warn.cust.name}</strong> müşterisinin vadesi geçmiş <strong>{fmtTL(warn.amount)}</strong> tutarında ödenmemiş borcu var. Yeni siparişe devam etmek istiyor musunuz?</div>
          <div className="fxb"><button className="btn" onClick={function(){setWarn(null);}}>Vazgeç</button><button className="btn btnP" onClick={doSubmit} disabled={busy}>Yine de Devam Et</button></div>
        </div>}

        {warn&&warn.type==="risk"&&<div>
          <div className="infobox ibW mb3"><i className="ti ti-alert-triangle" aria-hidden="true"/> Bu sipariş ile <strong>{warn.cust.name}</strong> müşterisinin açık hesabı <strong>{fmtTL(warn.amount)}</strong> olacak. Risk limiti: <strong>{fmtTL(warn.limit)}</strong>. Limit aşılıyor, devam edilsin mi?</div>
          <div className="fxb"><button className="btn" onClick={function(){setWarn(null);}}>Vazgeç</button><button className="btn btnP" onClick={doSubmit} disabled={busy}>Yine de Devam Et</button></div>
        </div>}
      </div>
    </div>
  );
}

/* ── ÖDEME / VADE TAKİBİ ── */
function PaymentTracking(props) {
  var sales=props.sales, customers=props.customers, checks=props.checks;
  var parasutSatislar=props.parasutSatislar||[];
  var today=new Date(); today.setHours(0,0,0,0);

  /* Sistem Sales tablosundan açık hesaplar (eski yöntem) */
  var openSales=sales.filter(function(s){return s.paymentStatus==="open"||s.paymentStatus==="unpaid";});
  var overdueSales=openSales.filter(function(s){
    var c=customers.find(function(x){return String(x.id)===String(s.customerId);});
    return isOverdue(s,c);
  });

  /* Paraşüt'ten gelen ödenmemiş faturalar — remaining > 0 */
  var parasutUnpaid = parasutSatislar.filter(function(s){
    return s.paymentStatus==="unpaid" || Number(s.remaining)>0;
  });

  /* Müşteri adına göre grupla */
  var byContact = {};
  parasutUnpaid.forEach(function(s){
    var name = String(s.contactName||"—");
    if(!byContact[name]) byContact[name]={name:name, totalRemaining:0, invoices:[], hasOverdue:false};
    byContact[name].totalRemaining += Number(s.remaining)||0;
    /* Due date kontrolü */
    var due = s.dueDate ? new Date(s.dueDate) : null;
    var isOvd = due && due < today;
    if(isOvd) byContact[name].hasOverdue = true;
    /* Aynı fatura birden fazla kalem içerebilir — tekrar ekleme */
    if(!byContact[name].invoices.find(function(i){return i.invoiceNo===s.invoiceNo;})){
      byContact[name].invoices.push({
        invoiceNo: s.invoiceNo,
        invoiceDate: s.invoiceDate,
        dueDate: s.dueDate,
        remaining: Number(s.remaining)||0,
        isOverdue: isOvd
      });
    }
  });
  var contactRows = Object.values(byContact).sort(function(a,b){return b.totalRemaining-a.totalRemaining;});
  var overdueContacts = contactRows.filter(function(r){return r.hasOverdue;});
  var totalUnpaid = contactRows.reduce(function(a,r){return a+r.totalRemaining;},0);
  var totalOverdue = overdueContacts.reduce(function(a,r){return a+r.totalRemaining;},0);

  var overdueChecks=checks.filter(function(c){return c.status==="pending"&&daysUntil(c.dueDate)<0;});
  var dueSoonChecks=checks.filter(function(c){return c.status==="pending"&&daysUntil(c.dueDate)>=0&&daysUntil(c.dueDate)<=7;});

  var _tab=useState("parasut"); var tab=_tab[0]; var setTab=_tab[1];

  return (
    <div>
      <div className="g3 mb4">
        <div className="sc"><div className="lbl">Paraşüt Açık Fatura</div><div className="val" style={{fontSize:18}}>{fmtTL(totalUnpaid)}</div></div>
        <div className="sc"><div className="lbl">Vadesi Geçmiş</div><div className="val" style={{fontSize:18,color:"var(--txD)"}}>{fmtTL(totalOverdue)}</div></div>
        <div className="sc"><div className="lbl">Bekleyen Çek</div><div className="val" style={{fontSize:18}}>{fmtTL(checks.filter(function(c){return c.status==="pending";}).reduce(function(a,c){return a+c.amount;},0))}</div></div>
      </div>

      {overdueContacts.length>0&&<div className="infobox ibW mb3"><i className="ti ti-alert-triangle" aria-hidden="true"/> <strong>{overdueContacts.length}</strong> müşterinin vadesi geçmiş açık faturası var!</div>}
      {overdueChecks.length>0&&<div className="infobox ibW mb3"><i className="ti ti-alert-triangle" aria-hidden="true"/> <strong>{overdueChecks.length}</strong> adet çekin vadesi geçti!</div>}
      {dueSoonChecks.length>0&&<div className="infobox ibI mb3"><i className="ti ti-clock" aria-hidden="true"/> <strong>{dueSoonChecks.length}</strong> adet çekin vadesi 7 gün içinde doluyor.</div>}

      <div className="tabs mb3">
        {[["parasut","Paraşüt Açık Faturalar"],["sistem","Sistem Kayıtları"],["cek","Çek Takibi"]].map(function(x){return(
          <button key={x[0]} className={"tab"+(tab===x[0]?" on":"")} onClick={function(){setTab(x[0]);}}>{x[1]}</button>
        );})}
      </div>

      {/* Paraşüt açık faturalar */}
      {tab==="parasut"&&<div>
        <div className="card" style={{padding:0}}>
          <div style={{padding:"10px 16px",borderBottom:".5px solid var(--bd)",fontWeight:500,fontSize:13}}>
            Müşteri Bazlı Açık Faturalar ({contactRows.length} müşteri)
          </div>
          <div className="tw"><table>
            <thead><tr><th>Müşteri</th><th>Açık Tutar</th><th>Fatura Sayısı</th><th>Durum</th></tr></thead>
            <tbody>
              {contactRows.length===0&&<tr><td colSpan={4}><div className="empty" style={{padding:16}}><p>Açık fatura yok — tüm ödemeler tamamlanmış</p></div></td></tr>}
              {contactRows.map(function(r){return(
                <tr key={r.name} style={{background:r.hasOverdue?"rgba(239,68,68,0.05)":"inherit"}}>
                  <td style={{fontWeight:500}}>{r.name}</td>
                  <td><strong style={{color:r.hasOverdue?"var(--txD)":"inherit"}}>{fmtTL(r.totalRemaining)}</strong></td>
                  <td>{r.invoices.length}</td>
                  <td>{r.hasOverdue?<span className="badge bd_">Vadesi Geçmiş</span>:<span className="badge bw">Bekliyor</span>}</td>
                </tr>
              );})}
            </tbody>
          </table></div>
        </div>
        {contactRows.length>0&&<div className="card mt3" style={{padding:0}}>
          <div style={{padding:"10px 16px",borderBottom:".5px solid var(--bd)",fontWeight:500,fontSize:13}}>Fatura Detayları</div>
          <div className="tw"><table>
            <thead><tr><th>Müşteri</th><th>Fatura No</th><th>Fatura Tarihi</th><th>Vade Tarihi</th><th>Kalan Tutar</th><th>Durum</th></tr></thead>
            <tbody>
              {contactRows.flatMap(function(r){return r.invoices.map(function(inv){return(
                <tr key={r.name+inv.invoiceNo} style={{background:inv.isOverdue?"rgba(239,68,68,0.05)":"inherit"}}>
                  <td style={{fontWeight:500}}>{r.name}</td>
                  <td style={{fontSize:12}}>{inv.invoiceNo||"—"}</td>
                  <td style={{fontSize:12}}>{String(inv.invoiceDate||"").slice(0,10)}</td>
                  <td style={{fontSize:12,color:inv.isOverdue?"var(--txD)":"inherit",fontWeight:inv.isOverdue?600:400}}>
                    {inv.dueDate?String(inv.dueDate).slice(0,10):"—"}
                    {inv.isOverdue&&<span style={{marginLeft:4,fontSize:10}}>({Math.abs(Math.round((new Date(inv.dueDate)-today)/864e5))} gün geçti)</span>}
                  </td>
                  <td><strong style={{color:inv.isOverdue?"var(--txD)":"inherit"}}>{fmtTL(inv.remaining)}</strong></td>
                  <td>{inv.isOverdue?<span className="badge bd_">Gecikmiş</span>:<span className="badge bw">Bekliyor</span>}</td>
                </tr>
              );});})}
            </tbody>
          </table></div>
        </div>}
      </div>}

      {/* Sistem kayıtları */}
      {tab==="sistem"&&<div className="card">
        <div className="ct">Sistem Kaynaklı Açık Hesaplar</div>
        <div className="tw"><table>
          <thead><tr><th>Müşteri</th><th>Tarih</th><th>Tutar</th><th>Vade Sonu</th><th>Gecikme</th></tr></thead>
          <tbody>
            {overdueSales.length===0&&<tr><td colSpan={5}><div className="empty" style={{padding:16}}><p>Vadesi geçmiş kayıt yok</p></div></td></tr>}
            {overdueSales.map(function(s){
              var c=customers.find(function(x){return String(x.id)===String(s.customerId);});
              return(<tr key={s.id}>
                <td style={{fontWeight:500}}>{c?c.name:"—"}</td>
                <td style={{fontSize:12}}>{s.date}</td>
                <td>{fmtTL(s.qty*s.price)}</td>
                <td style={{fontSize:12}}>{dueDateOf(s,c).toISOString().split("T")[0]}</td>
                <td><span className="badge bd_">{overdueDays(s,c)} gün</span></td>
              </tr>);
            })}
          </tbody>
        </table></div>
      </div>}

      {/* Çek takibi */}
      {tab==="cek"&&<div className="card">
        <div className="ct">Çek Takibi</div>
        <div className="tw"><table>
          <thead><tr><th>Müşteri</th><th>Tutar</th><th>Vade</th><th>Durum</th></tr></thead>
          <tbody>
            {checks.length===0&&<tr><td colSpan={4}><div className="empty" style={{padding:16}}><p>Çek kaydı yok</p></div></td></tr>}
            {checks.map(function(ch){
              var c=customers.find(function(x){return String(x.id)===String(ch.customerId);});
              var d=daysUntil(ch.dueDate);
              var overdue=ch.status==="pending"&&d<0;
              return(<tr key={ch.id}>
                <td style={{fontWeight:500}}>{c?c.name:"—"}</td>
                <td>{fmtTL(ch.amount)}</td>
                <td style={{fontSize:12,color:overdue?"var(--txD)":"inherit"}}>{ch.dueDate}</td>
                <td>{ch.status==="paid"?<span className="badge bs">Ödendi</span>:overdue?<span className="badge bd_">Vadesi Geçti</span>:<span className="badge bw">Bekliyor</span>}</td>
              </tr>);
            })}
          </tbody>
        </table></div>
      </div>}
    </div>
  );
}

/* ── MÜŞTERİ BAZLI RAPOR BİLEŞENİ ── */
function MusteriBazliRapor(p) {
  var dataA=p.dataA||[], dataB=p.dataB||[];
  var yilA=p.yilA||"A", yilB=p.yilB||"B", topN=p.topN||10;
  var profitGroupBy=p.profitGroupBy||function(){return[];};
  var groupBy=p.groupBy||function(){return[];};

  var _search=useState(""); var search=_search[0]; var setSearch=_search[1];
  var _viewMode=useState("tablo"); var viewMode=_viewMode[0]; var setViewMode=_viewMode[1];

  /* Tüm müşteri listesi */
  var grpA = groupBy(dataA,"contactName");
  var grpB = groupBy(dataB,"contactName");
  var pgA  = profitGroupBy(dataA,"contactName");
  var pgB  = profitGroupBy(dataB,"contactName");

  var mapAR={}, mapBR={}, pgMapA={}, pgMapB={};
  grpA.forEach(function(r){mapAR[r.label]=r;});
  grpB.forEach(function(r){mapBR[r.label]=r;});
  pgA.forEach(function(r){pgMapA[r.label]=r;});
  pgB.forEach(function(r){pgMapB[r.label]=r;});

  var allLabels = Array.from(new Set(Object.keys(mapAR).concat(Object.keys(mapBR))));
  var merged = allLabels.map(function(label){
    var a=mapAR[label]||{revenue:0,qty:0};
    var b=mapBR[label]||{revenue:0,qty:0};
    var pa=pgMapA[label]||{profit:null};
    var pb=pgMapB[label]||{profit:null};
    var revDiff=b.revenue>0?((a.revenue-b.revenue)/b.revenue*100):null;
    var profDiff=pa.profit!==null&&pb.profit!==null?pa.profit-pb.profit:null;
    return {label:label, aRev:a.revenue||0, aQty:a.qty||0, aProfit:pa.profit,
            bRev:b.revenue||0, bQty:b.qty||0, bProfit:pb.profit,
            revDiff:revDiff, profDiff:profDiff};
  }).sort(function(a,b){return b.aRev-a.aRev;});

  /* Arama filtresi */
  var filtered = search.trim()
    ? merged.filter(function(r){return r.label.toLowerCase().includes(search.toLowerCase());})
    : merged.slice(0,topN);

  function diffBadge(v){
    if(v===null) return <span style={{color:"var(--tx3)"}}>—</span>;
    var cls=v>0?"var(--txS)":v<0?"var(--txD)":"var(--tx2)";
    return <span style={{color:cls,fontWeight:500}}>{v>0?"+":""}{v.toFixed(1)}%</span>;
  }
  function profitBadge(v){
    if(v===null) return <span style={{color:"var(--tx3)"}}>—</span>;
    var cls=v>=25?"bs":v>=10?"bw":"bd_";
    return <span className={"badge "+cls}>%{v.toFixed(1)}</span>;
  }

  /* Karlılık bar chart verisi */
  var profRows = filtered.filter(function(r){return r.aProfit!==null;})
    .map(function(r){return {label:r.label, A:r.aProfit||0, B:r.bProfit||0};})
    .slice(0,Math.min(filtered.length,15));
  var maxProf = Math.max.apply(null, profRows.map(function(r){return Math.max(r.A||0,r.B||0);}),1)||1;

  return (
    <div>
      {/* Araç çubuğu */}
      <div className="fxb mb3" style={{gap:8,flexWrap:"wrap"}}>
        <div className="swrap" style={{flex:1,maxWidth:300}}>
          <i className="ti ti-search si" aria-hidden="true"/>
          <input placeholder="Müşteri adı filtrele..." value={search} onChange={function(e){setSearch(e.target.value);}}/>
        </div>
        <div className="fx g2g">
          {["tablo","grafik","karlilik"].map(function(m){return(
            <button key={m} className={"btn bxs"+(viewMode===m?" btnP":"")} onClick={function(){setViewMode(m);}}>
              {m==="tablo"?"📋 Tablo":m==="grafik"?"📊 Ciro Grafik":"💰 Karlılık"}
            </button>
          );})}
        </div>
      </div>
      {search&&<div style={{fontSize:12,color:"var(--tx2)",marginBottom:8}}>{filtered.length} müşteri bulundu</div>}

      {/* TABLO */}
      {viewMode==="tablo"&&<div className="card" style={{padding:0}}>
        <div className="tw" style={{overflowX:"auto"}}><table style={{minWidth:650}}>
          <thead>
            <tr style={{background:"var(--bg2)"}}>
              <th rowSpan={2}>Müşteri</th>
              <th colSpan={3} style={{textAlign:"center",color:"var(--bdI)"}}>{yilA}</th>
              <th colSpan={3} style={{textAlign:"center",color:"#f59e0b"}}>{yilB}</th>
              <th colSpan={2} style={{textAlign:"center"}}>Değişim</th>
            </tr>
            <tr style={{background:"var(--bg2)"}}>
              <th style={{color:"var(--bdI)"}}>Adet</th>
              <th style={{color:"var(--bdI)"}}>Ciro</th>
              <th style={{color:"var(--bdI)"}}>Kâr%</th>
              <th style={{color:"#f59e0b"}}>Adet</th>
              <th style={{color:"#f59e0b"}}>Ciro</th>
              <th style={{color:"#f59e0b"}}>Kâr%</th>
              <th>Ciro</th>
              <th>Kâr%</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={9}><div className="empty" style={{padding:16}}><p>Sonuç yok</p></div></td></tr>}
            {filtered.map(function(r){
              return(<tr key={r.label}>
                <td style={{fontWeight:500,fontSize:12}}>{r.label}</td>
                <td style={{color:"var(--bdI)"}}>{r.aQty}</td>
                <td style={{color:"var(--bdI)",fontWeight:500}}>{fmtTL(r.aRev)}</td>
                <td>{profitBadge(r.aProfit)}</td>
                <td style={{color:"#f59e0b"}}>{r.bQty||"—"}</td>
                <td style={{color:"#f59e0b"}}>{r.bRev>0?fmtTL(r.bRev):"—"}</td>
                <td>{profitBadge(r.bProfit)}</td>
                <td>{diffBadge(r.revDiff)}</td>
                <td>{r.profDiff!==null?<span style={{color:r.profDiff>0?"var(--txS)":r.profDiff<0?"var(--txD)":"inherit",fontWeight:500}}>{r.profDiff>0?"+":""}{r.profDiff.toFixed(1)} puan</span>:<span style={{color:"var(--tx3)"}}>—</span>}</td>
              </tr>);
            })}
          </tbody>
        </table></div>
      </div>}

      {/* CİRO GRAFİĞİ */}
      {viewMode==="grafik"&&<div className="card">
        <div className="ct">Müşteri Ciro Karşılaştırması — {yilA} vs {yilB}</div>
        {(function(){
          var rows2=filtered.slice(0,15);

            <text x={pL+11} y={9} fontSize="8" fill="var(--tx2)">{yilA}</text>
            <rect x={pL+35} y={4} width={8} height={6} fill="#f59e0b" rx="1"/>
            <text x={pL+46} y={9} fontSize="8" fill="var(--tx2)">{yilB}</text></g>
          </svg>;

      {/* KARLILIK GRAFİĞİ */}
      {viewMode==="karlilik"&&<div>
        <div className="card mb3">
          <div className="ct">Müşteri Karlılık Karşılaştırması — {yilA} vs {yilB}</div>
          {profRows.length===0?<div className="empty" style={{padding:20}}><p>Karlılık verisi yok (satın alma maliyeti gerekli)</p></div>:(function(){
            var W=520,H=260,pL=60,pB=40,pT=16;
            var bW=Math.max(8,Math.floor((W-pL-16)/(profRows.length*2.5+1)));
            var gW=bW*2+4;
            return <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto"}}>
              {[0,0.5,1].map(function(t){var y=pT+(H-pT-pB)*(1-t);return <g key={t}>
                <line x1={pL} x2={W-8} y1={y} y2={y} stroke="var(--bd)" strokeWidth="0.5"/>

              {profRows.map(function(r,i){

                var hB=r.B>0?Math.max(1,(H-pT-pB)*Math.max(0,r.B)/maxProf):0;
                var clr=r.A>=25?"var(--txS)":r.A>=10?"var(--txW)":"var(--txD)";
                var lbl=r.label.length>10?r.label.slice(0,10)+"…":r.label;
                return <g key={i}>
                  <rect x={x0} y={H-pB-hA} width={bW} height={hA} fill={clr} rx="2"/>
                  {hB>0&&<rect x={x0+bW+1} y={H-pB-hB} width={bW} height={hB} fill={clr} rx="2" opacity="0.4"/>}
                  <text x={x0+bW} y={H-pB+14} textAnchor="middle" fontSize="7" fill="var(--tx3)" transform={"rotate(-35,"+(x0+bW)+","+(H-pB+14)+")"}>{lbl}</text>
                </g>;
              })}
              <g><rect x={pL} y={4} width={8} height={6} fill="var(--tx2)" rx="1"/>
              <text x={pL+11} y={9} fontSize="8" fill="var(--tx2)">{yilA}</text>
              <rect x={pL+35} y={4} width={8} height={6} fill="var(--tx2)" rx="1" opacity="0.4"/>

            <tbody>
              {filtered.filter(function(r){return r.aProfit!==null;}).map(function(r){

                return(<tr key={r.label}>
                  <td style={{fontWeight:500,fontSize:12}}>{r.label}</td>
                  <td><span className={"badge "+clsA}>%{r.aProfit.toFixed(1)}</span></td>
                  <td>{r.bProfit!==null?<span className={"badge "+clsB}>%{r.bProfit.toFixed(1)}</span>:<span style={{color:"var(--tx3)"}}>—</span>}</td>
                  <td>{r.profDiff!==null?<span style={{color:r.profDiff>0?"var(--txS)":r.profDiff<0?"var(--txD)":"inherit",fontWeight:600}}>{r.profDiff>0?"+":""}{r.profDiff.toFixed(1)} puan</span>:<span style={{color:"var(--tx3)"}}>—</span>}</td>
                  <td>{fmtTL(r.aRev)}</td>

        </div>
      </div>}
    </div>
  );
}

/* ── ÜRÜN BAZLI RAPOR BİLEŞENİ ── */
function UrunBazliRapor(p) {
  var dataA=p.dataA||[], dataB=p.dataB||[];
  var yilA=p.yilA||"A", yilB=p.yilB||"B", topN=p.topN||10;
  var enrichedFiltered=p.enrichedFiltered||[];

  /* Güvenli fonksiyon referansları */
  var profitGroupBy = p.profitGroupBy || function(arr,key){
    var m={};
    arr.forEach(function(s){
      var k=String(s[key]||"—");
      if(!m[k]) m[k]={label:k,totalRev:0,totalCost:0,qty:0};
      m[k].totalRev+=s.revenue||0;
      m[k].totalCost+=(s.unitCost||0)*(Number(s.qty)||0);
      m[k].qty+=Number(s.qty)||0;
    });
    return Object.values(m).map(function(r){
      return Object.assign({},r,{profit:r.totalCost>0?(r.totalRev/r.totalCost-1)*100:null});
    }).sort(function(a,b){return b.totalRev-a.totalRev;});
  };
  var groupBy = p.groupBy || function(arr,key){
    var m={};
    arr.forEach(function(s){
      var k=String(s[key]||"—");
      if(!m[k]) m[k]={label:k,revenue:0,qty:0,count:0};
      m[k].revenue+=s.revenue||0;
      m[k].qty+=Number(s.qty)||0;
      m[k].count++;
    });
    return Object.values(m).sort(function(a,b){return b.revenue-a.revenue;});
  };

  var _selModels=useState([]); var selModels=_selModels[0]; var setSelModels=_selModels[1];
  var _modelSearch=useState(""); var modelSearch=_modelSearch[0]; var setModelSearch=_modelSearch[1];
  var _viewMode=useState("tablo"); var viewMode=_viewMode[0]; var setViewMode=_viewMode[1];

  /* Tüm unique model listesi */
  var allModels = Array.from(new Set(
    dataA.concat(dataB).map(function(s){return s.displayName||"—";})
  )).filter(function(m){return m&&m!=="—";}).sort();

  /* Model bazında A ve B yılı veri */
  var pgA = profitGroupBy(dataA,"displayName");
  var pgB = profitGroupBy(dataB,"displayName");
  var grpA = groupBy(dataA,"displayName");
  var grpB = groupBy(dataB,"displayName");

  /* Map'ler */
  var mapA={}, mapB={}, pgMapA={}, pgMapB={};
  grpA.forEach(function(r){mapA[r.label]=r;});
  grpB.forEach(function(r){mapB[r.label]=r;});
  pgA.forEach(function(r){pgMapA[r.label]=r;});
  pgB.forEach(function(r){pgMapB[r.label]=r;});

  /* Birleştirilmiş satır listesi */
  var allLabels = Array.from(new Set(Object.keys(mapA).concat(Object.keys(mapB))));
  var merged = allLabels.map(function(label){
    var a=mapA[label]||{revenue:0,qty:0};
    var b=mapB[label]||{revenue:0,qty:0};
    var pa=pgMapA[label]||{profit:null};
    var pb=pgMapB[label]||{profit:null};
    var revDiff = b.revenue>0?((a.revenue-b.revenue)/b.revenue*100):null;
    var qtyDiff = b.qty>0?((a.qty-b.qty)/b.qty*100):null;
    return {label:label, aRev:a.revenue||0, aQty:a.qty||0, aProfit:pa.profit,
            bRev:b.revenue||0, bQty:b.qty||0, bProfit:pb.profit,
            revDiff:revDiff, qtyDiff:qtyDiff};
  }).sort(function(a,b){return b.aRev-a.aRev;});

  /* Seçili modeller için aylık trend */
  var monthlyByModel = {};
  selModels.forEach(function(model){
    var months={};
    enrichedFiltered.forEach(function(s){
      if(s.displayName!==model) return;
      var m=s.month||"—";
      if(!months[m]) months[m]={month:m,aRev:0,aQty:0,bRev:0,bQty:0};
      if(s.year===yilA){months[m].aRev+=s.revenue;months[m].aQty+=Number(s.qty)||0;}
      if(s.year===yilB){months[m].bRev+=s.revenue;months[m].bQty+=Number(s.qty)||0;}
    });
    monthlyByModel[model]=Object.values(months).sort(function(a,b){return a.month>b.month?1:-1;});
  });

  /* Seçili model toggle */
  function toggleModel(label){
    setSelModels(function(prev){
      if(prev.indexOf(label)>=0) return prev.filter(function(m){return m!==label;});
      return prev.concat([label]).slice(-5); /* max 5 model */
    });
  }

  /* Görünen satırlar */
  var visibleMerged = merged.slice(0,topN);

  function diffBadge(v){
    if(v===null) return <span style={{color:"var(--tx3)"}}>—</span>;
    var cls=v>0?"var(--txS)":v<0?"var(--txD)":"var(--tx2)";
    return <span style={{color:cls,fontWeight:500}}>{v>0?"+":""}{v.toFixed(1)}%</span>;
  }
  function profitBadge(v){
    if(v===null) return <span style={{color:"var(--tx3)"}}>—</span>;
    var cls=v>=25?"bs":v>=10?"bw":"bd_";
    return <span className={"badge "+cls}>%{v.toFixed(1)}</span>;
  }

  /* Seçili modellerin renkleri */
  var modelColors=["#3b82f6","#f59e0b","#10b981","#ef4444","#8b5cf6"];

  return (
    <div>
      {/* Görünüm modu */}
      <div className="fxb mb3">
        <div className="fx g2g">
          {["tablo","grafik"].map(function(m){return(
            <button key={m} className={"btn bxs"+(viewMode===m?" btnP":"")} onClick={function(){setViewMode(m);}}>
              <i className={"ti ti-"+(m==="tablo"?"table":"chart-bar")} aria-hidden="true"/>
              {m==="tablo"?"Detaylı Tablo":"Grafik"}
            </button>
          );})}
        </div>
        {selModels.length>0&&<div className="fx g2g" style={{flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"var(--tx2)"}}>Seçili:</span>
          {selModels.map(function(m,i){return(
            <span key={m} style={{fontSize:11,background:modelColors[i],color:"#fff",padding:"2px 8px",borderRadius:12,cursor:"pointer"}} onClick={function(){toggleModel(m);}}>
              {m} ✕
            </span>
          );})}
        </div>}
      </div>

      {/* TABLO GÖRÜNÜMÜ */}
      {viewMode==="tablo"&&<div>
        <div className="card" style={{padding:0}}>
          <div className="tw" style={{overflowX:"auto"}}><table style={{minWidth:700}}>
            <thead>
              <tr style={{background:"var(--bg2)"}}>
                <th rowSpan={2} style={{minWidth:140}}>Model No</th>
                <th colSpan={3} style={{textAlign:"center",borderBottom:".5px solid var(--bd)",color:"var(--bdI)"}}>{yilA}</th>
                <th colSpan={3} style={{textAlign:"center",borderBottom:".5px solid var(--bd)",color:"#f59e0b"}}>{yilB}</th>
                <th colSpan={2} style={{textAlign:"center"}}>Değişim</th>
                <th rowSpan={2} style={{width:32}}></th>
              </tr>
              <tr style={{background:"var(--bg2)"}}>
                <th style={{color:"var(--bdI)"}}>Adet</th>
                <th style={{color:"var(--bdI)"}}>Ciro</th>
                <th style={{color:"var(--bdI)"}}>Kâr%</th>
                <th style={{color:"#f59e0b"}}>Adet</th>
                <th style={{color:"#f59e0b"}}>Ciro</th>
                <th style={{color:"#f59e0b"}}>Kâr%</th>
                <th>Ciro</th>
                <th>Adet</th>
              </tr>
            </thead>
            <tbody>
              {visibleMerged.length===0&&<tr><td colSpan={10}><div className="empty" style={{padding:20}}><p>Veri yok</p></div></td></tr>}
              {visibleMerged.map(function(r){
                var isSel=selModels.indexOf(r.label)>=0;
                var selIdx=selModels.indexOf(r.label);
                return(
                  <tr key={r.label} style={{background:isSel?"var(--bgI)":"inherit",cursor:"pointer"}} onClick={function(){toggleModel(r.label);}}>
                    <td>
                      <div className="fx g1" style={{alignItems:"center"}}>
                        {isSel&&<span style={{width:8,height:8,borderRadius:"50%",background:modelColors[selIdx],display:"inline-block",flexShrink:0}}/>}
                        <span style={{fontWeight:500,fontSize:12}}>{r.label}</span>
                      </div>
                    </td>
                    <td style={{color:"var(--bdI)"}}>{r.aQty}</td>
                    <td style={{color:"var(--bdI)",fontWeight:500}}>{fmtTL(r.aRev)}</td>
                    <td>{profitBadge(r.aProfit)}</td>
                    <td style={{color:"#f59e0b"}}>{r.bQty||"—"}</td>
                    <td style={{color:"#f59e0b"}}>{r.bRev>0?fmtTL(r.bRev):"—"}</td>
                    <td>{profitBadge(r.bProfit)}</td>
                    <td>{diffBadge(r.revDiff)}</td>
                    <td>{diffBadge(r.qtyDiff)}</td>
                    <td>
                      <button className={"btn bxs"+(isSel?" btnP":"")} style={{padding:"2px 6px",fontSize:10}} onClick={function(e){e.stopPropagation();toggleModel(r.label);}}>
                        {isSel?"✓":"+"} Seç
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table></div>
          <div style={{padding:"8px 16px",fontSize:11,color:"var(--tx3)"}}>
            Satıra tıklayarak veya "+ Seç" ile model seçin (max 5), seçili modellerin aylık trendi aşağıda görünür.
          </div>
        </div>
      </div>}

      {/* GRAFİK GÖRÜNÜMÜ */}
      {viewMode==="grafik"&&<div className="g2">
        <div className="card">
          <div className="ct">Ciro Karşılaştırması — {yilA} vs {yilB}</div>
          {(function(){
            var rowsA=grpA.slice(0,topN), rowsB=grpB.slice(0,topN);
            var mapB2={}; rowsB.forEach(function(r){mapB2[r.label]=r.revenue||0;});
            var rows2=rowsA.map(function(r){return {label:r.label,A:r.revenue||0,B:mapB2[r.label]||0};});
            var maxV=Math.max.apply(null,rows2.map(function(r){return Math.max(r.A,r.B);}),1)||1;
            var W=480,H=240,pL=70,pB=36,pT=16;
            var bW=Math.max(6,Math.floor((W-pL-16)/(rows2.length*2.5+1)));
            var gW=bW*2+4;
            return <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto"}}>
              {[0,0.5,1].map(function(t){var y=pT+(H-pT-pB)*(1-t);return <g key={t}>
                <line x1={pL} x2={W-8} y1={y} y2={y} stroke="var(--bd)" strokeWidth="0.5"/>
                <text x={pL-3} y={y+3} textAnchor="end" fontSize="9" fill="var(--tx3)">{Math.round(maxV*t/1000)+"K"}</text>
              </g>;})}
              {rows2.map(function(r,i){
                var x0=pL+6+i*gW;
                var hA=Math.max(1,(H-pT-pB)*r.A/maxV), hB=r.B>0?Math.max(1,(H-pT-pB)*r.B/maxV):0;
                var lbl=r.label.length>10?r.label.slice(0,10)+"…":r.label;
                return <g key={i}>
                  <rect x={x0} y={H-pB-hA} width={bW} height={hA} fill="var(--bdI)" rx="2"/>
                  {hB>0&&<rect x={x0+bW+1} y={H-pB-hB} width={bW} height={hB} fill="#f59e0b" rx="2"/>}
                  <text x={x0+bW} y={H-pB+12} textAnchor="middle" fontSize="7" fill="var(--tx3)" transform={"rotate(-30,"+(x0+bW)+","+(H-pB+12)+")"}>{lbl}</text>
                </g>;
              })}
              <g><rect x={pL} y={4} width={8} height={6} fill="var(--bdI)" rx="1"/>
              <text x={pL+11} y={9} fontSize="8" fill="var(--tx2)">{yilA}</text>
              <rect x={pL+35} y={4} width={8} height={6} fill="#f59e0b" rx="1"/>
              <text x={pL+46} y={9} fontSize="8" fill="var(--tx2)">{yilB}</text></g>
            </svg>;
          })()}
        </div>
        <div className="card">
          <div className="ct">Karlılık (%) — {yilA}</div>
          {(function(){
            var rows2=pgA.slice(0,topN).map(function(r){return {label:r.label,val:r.profit||0};});
            var maxV=Math.max.apply(null,rows2.map(function(r){return r.val;}),1)||1;
            var W=480,H=240,pL=60,pB=36,pT=16;
            var bW=Math.max(10,Math.floor((W-pL-16)/(rows2.length*1.5+1)));
            return <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto"}}>
              {[0,0.5,1].map(function(t){var y=pT+(H-pT-pB)*(1-t);return <g key={t}>
                <line x1={pL} x2={W-8} y1={y} y2={y} stroke="var(--bd)" strokeWidth="0.5"/>
                <text x={pL-3} y={y+3} textAnchor="end" fontSize="9" fill="var(--tx3)">%{Math.round(maxV*t)}</text>
              </g>;})}
              {rows2.map(function(r,i){
                var x0=pL+6+i*(bW+6);
                var h=Math.max(1,(H-pT-pB)*Math.max(0,r.val)/maxV);
                var clr=r.val>=25?"var(--txS)":r.val>=10?"var(--txW)":"var(--txD)";
                var lbl=r.label.length>10?r.label.slice(0,10)+"…":r.label;
                return <g key={i}>
                  <rect x={x0} y={H-pB-h} width={bW} height={h} fill={clr} rx="2"/>
                  <text x={x0+bW/2} y={H-pB+12} textAnchor="middle" fontSize="7" fill="var(--tx3)" transform={"rotate(-30,"+(x0+bW/2)+","+(H-pB+12)+")"}>{lbl}</text>
                </g>;
              })}
            </svg>;
          })()}
        </div>
      </div>}

      {/* SEÇİLİ MODELLERİN AYLIK TRENDİ */}
      {selModels.length>0&&<div style={{marginTop:16}}>
        <div className="card">
          <div className="ct">Seçili Modeller — Aylık Trend ({yilA} vs {yilB})</div>
          {selModels.map(function(model,mi){
            var rows=monthlyByModel[model]||[];
            if(!rows.length) return null;
            var maxRev=Math.max.apply(null,rows.map(function(r){return Math.max(r.aRev,r.bRev);}),1)||1;
            var W=460,H=180,padL=60,padB=32,padT=12;
            var bW=Math.max(8,Math.floor((W-padL-16)/(rows.length*2+1)));
            return(
              <div key={model} style={{marginBottom:20}}>
                <div className="fxb mb2">
                  <span style={{fontSize:13,fontWeight:600,color:modelColors[mi]}}>{model}</span>

                  </span>
                </div>
                <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",maxWidth:W,height:"auto",display:"block"}}>
                  {[0,0.5,1].map(function(t){

                    return <g key={t}>
                      <line x1={padL} x2={W-8} y1={y} y2={y} stroke="var(--bd)" strokeWidth="0.5"/>
                      <text x={padL-3} y={y+3} textAnchor="end" fontSize="8" fill="var(--tx3)">{Math.round(maxRev*t/1000)+"K"}</text>
                    </g>;
                  })}
                  {rows.map(function(r,i){
                    var x0=padL+6+i*(bW*2+4);
                    var hA=(H-padT-padB)*r.aRev/maxRev;
                    var hB=(H-padT-padB)*r.bRev/maxRev;
                    var mon=r.month?r.month.slice(5):"";
                    return <g key={i}>
                      <rect x={x0} y={H-padB-hA} width={bW} height={Math.max(1,hA)} fill={modelColors[mi]} rx="1" opacity="0.9"/>
                      {r.bRev>0&&<rect x={x0+bW+1} y={H-padB-hB} width={bW} height={Math.max(1,hB)} fill={modelColors[mi]} rx="1" opacity="0.35"/>}
                      <text x={x0+bW} y={H-padB+12} textAnchor="middle" fontSize="7" fill="var(--tx3)">{mon}</text>
                    </g>;
                  })}
                  <g>
                    <rect x={padL} y={3} width={8} height={6} fill={modelColors[mi]} rx="1"/>
                    <text x={padL+11} y={8} fontSize="7" fill="var(--tx2)">{yilA}</text>
                    <rect x={padL+30} y={3} width={8} height={6} fill={modelColors[mi]} rx="1" opacity="0.4"/>
                    <text x={padL+41} y={8} fontSize="7" fill="var(--tx2)">{yilB}</text>
                  </g>
                </svg>
                {/* Aylık adet+ciro tablosu */}
                <div className="tw" style={{marginTop:8}}><table style={{fontSize:11}}>
                  <thead><tr>
                    <th>Ay</th>
                    <th style={{color:"var(--bdI)"}}>{yilA} Adet</th>
                    <th style={{color:"var(--bdI)"}}>{yilA} Ciro</th>
                    <th style={{color:"#f59e0b"}}>{yilB} Adet</th>
                    <th style={{color:"#f59e0b"}}>{yilB} Ciro</th>
                    <th>Fark</th>
                  </tr></thead>
                  <tbody>
                    {rows.filter(function(r){return r.aRev>0||r.bRev>0;}).map(function(r){
                      var diff=r.bRev>0?((r.aRev-r.bRev)/r.bRev*100):null;
                      return(<tr key={r.month}>
                        <td style={{fontWeight:500}}>{monthLabel(r.month)}</td>
                        <td style={{color:"var(--bdI)"}}>{r.aQty}</td>
                        <td style={{color:"var(--bdI)"}}>{fmtTL(r.aRev)}</td>
                        <td style={{color:"#f59e0b"}}>{r.bQty||"—"}</td>
                        <td style={{color:"#f59e0b"}}>{r.bRev>0?fmtTL(r.bRev):"—"}</td>
                        <td>{diff!==null?<span style={{color:diff>0?"var(--txS)":diff<0?"var(--txD)":"inherit",fontWeight:500}}>{diff>0?"+":""}{diff.toFixed(1)}%</span>:"—"}</td>
                      </tr>);
                    })}
                  </tbody>
                </table></div>
              </div>
            );
          })}
        </div>
      </div>}
    </div>
  );
}

/* ── SATIŞ RAPORLARI ── */
function SatisRaporlari() {
  var _loading=useState(true); var loading=_loading[0]; var setLoading=_loading[1];
  var _satislar=useState([]); var satislar=_satislar[0]; var setSatislar=_satislar[1];
  var _eslestirme=useState({}); var eslestirme=_eslestirme[0]; var setEslestirme=_eslestirme[1];
  var _tab=useState("urun"); var tab=_tab[0]; var setTab=_tab[1];
  var _yilA=useState("2025"); var yilA=_yilA[0]; var setYilA=_yilA[1];
  var _yilB=useState("2024"); var yilB=_yilB[0]; var setYilB=_yilB[1];
  var _dateFrom=useState(""); var dateFrom=_dateFrom[0]; var setDateFrom=_dateFrom[1];
  var _dateTo=useState(""); var dateTo=_dateTo[0]; var setDateTo=_dateTo[1];
  var _topN=useState(10); var topN=_topN[0]; var setTopN=_topN[1];
  var _catFilter=useState("Tümü"); var catFilter=_catFilter[0]; var setCatFilter=_catFilter[1];
  /* Satış raporları için LOT maliyetlerini de çek */
  var _lots=useState([]); var lots=_lots[0]; var setLots=_lots[1];
  /* Paraşüt satın alma ağırlıklı ortalama maliyetleri: modelNo → avgUnitCost */
  var _mm=useState({}); var maliyetMap=_mm[0]; var setMaliyetMap=_mm[1];

  useEffect(function(){ loadAll(); }, []);

  function loadAll(){
    setLoading(true);
    Promise.all([
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getParasutSatislar"})}).then(function(r){return r.json();}),
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getParasutUrunler"})}).then(function(r){return r.json();}),
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"get",sheet:"ParasutEslestirme"})}).then(function(r){return r.json();}),
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"get",sheet:"Lots"})}).then(function(r){return r.json();}),
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getParasutMaliyetler"})}).then(function(r){return r.json();})
    ]).then(function(results){
      setLoading(false);
      var satisData = results[0].ok ? (results[0].data||[]) : [];
      var eslData   = results[2].ok ? (results[2].data||[]) : [];
      var lotsData  = results[3].ok ? (results[3].data||[]) : [];
      var maliyetData = results[4].ok ? (results[4].data||[]) : [];
      setSatislar(satisData);
      setLots(lotsData);
      /* Maliyet map: modelNo → avgUnitCost */
      var mm = {};
      maliyetData.forEach(function(m){ if(m.modelNo) mm[String(m.modelNo).trim()] = Number(m.avgUnitCost)||0; });
      setMaliyetMap(mm);
      var em = {};
      eslData.forEach(function(e){ if(e.parasutName) em[String(e.parasutName)] = e; });
      setEslestirme(em);
    }).catch(function(){ setLoading(false); });
  }

  /* Satış verisini zenginleştir: eşleştirme tablosundan kategori/ürün al */
  var enriched = satislar.map(function(s){
    var pName = String(s.productName||"");
    var esl = eslestirme[pName] || {};
    var modelNo = esl.systemModelNo || pName || "—";
    /* Maliyet: Paraşüt satın alma faturası ağırlıklı ortalama */
    var avgCost = maliyetMap[modelNo] || maliyetMap[pName] || 0;
    var unitPrice = Number(s.unitPrice)||0;
    var profit = avgCost>0 ? (unitPrice/avgCost - 1)*100 : null;
    return Object.assign({}, s, {
      displayName: modelNo,
      category:    esl.category || s.category || "—",
      revenue:     unitPrice * (Number(s.qty)||0),
      unitCost:    avgCost,
      profit:      profit,
      year:        s.invoiceDate ? String(s.invoiceDate).slice(0,4) : "—",
      month:       s.invoiceDate ? String(s.invoiceDate).slice(0,7) : "—"
    });
  });

  /* Tüm kategoriler */
  var allCats = ["Tümü"].concat(Array.from(new Set(enriched.map(function(s){return s.category;}).filter(function(c){return c&&c!=="—";}))).sort());

  /* Kategori filtreli enriched */
  var enrichedFiltered = catFilter==="Tümü" ? enriched : enriched.filter(function(s){return s.category===catFilter;});

  /* Yıl listesi */
  var years = Array.from(new Set(enriched.map(function(s){return s.year;}).filter(function(y){return y!=="—";}))).sort().reverse();

  /* Yıla göre filtrele (kategori filtresi de uygulanır) */
  function byYear(y){ return enrichedFiltered.filter(function(s){return s.year===y;}); }
  var dataA = byYear(yilA);
  var dataB = byYear(yilB);

  /* Tarih aralığı filtresi */
  var dataRange = enrichedFiltered.filter(function(s){
    if(dateFrom && s.invoiceDate && String(s.invoiceDate).slice(0,10) < dateFrom) return false;
    if(dateTo   && s.invoiceDate && String(s.invoiceDate).slice(0,10) > dateTo)   return false;
    return true;
  });

  /* Karlılık gruplama: model no veya kategori bazında */
  function profitGroupBy(arr, key){
    var m = {};
    arr.forEach(function(s){
      var k = String(s[key]||"—");
      if(!m[k]) m[k]={label:k, totalRev:0, totalCost:0, qty:0};
      m[k].totalRev  += s.revenue;
      m[k].totalCost += (Number(s.unitCost)||0) * (Number(s.qty)||0);
      m[k].qty       += Number(s.qty)||0;
    });
    return Object.values(m).map(function(r){
      var pp = r.totalCost>0 ? (r.totalRev/r.totalCost - 1)*100 : null;
      return Object.assign({},r,{profit:pp});
    }).sort(function(a,b){return b.totalRev-a.totalRev;});
  }

  /* Gruplama yardımcısı */
  function groupBy(arr, key){
    var m = {};
    arr.forEach(function(s){
      var k = String(s[key]||"—");
      if(!m[k]) m[k] = {label:k, revenue:0, qty:0, count:0};
      m[k].revenue += s.revenue;
      m[k].qty     += Number(s.qty)||0;
      m[k].count++;
    });
    return Object.values(m).sort(function(a,b){return b.revenue-a.revenue;});
  }

  /* Aylık trend: {month → {A: rev, B: rev}} */
  function monthTrend(){
    /* Ay bazında grupla: key = "01"..."12", A=yilA, B=yilB */
    var months = {};
    dataA.forEach(function(s){
      var k = String(s.month||"").slice(5,7); /* "2025-03" → "03" */
      if(!k) return;
      if(!months[k]) months[k]={month:k,A:0,B:0,aQty:0,bQty:0};
      months[k].A += s.revenue||0;
      months[k].aQty += Number(s.qty)||0;
    });
    dataB.forEach(function(s){
      var k = String(s.month||"").slice(5,7);
      if(!k) return;
      if(!months[k]) months[k]={month:k,A:0,B:0,aQty:0,bQty:0};
      months[k].B += s.revenue||0;
      months[k].bQty += Number(s.qty)||0;
    });
    var AYLAR = ["01","02","03","04","05","06","07","08","09","10","11","12"];
    var AY_ADLARI = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
    return AYLAR.filter(function(k){return months[k];}).map(function(k){
      var idx = parseInt(k,10)-1;
      return Object.assign({},months[k],{label:AY_ADLARI[idx]});
    });
  }

  /* SVG Bar Chart bileşeni — rowsA: A yılı, rowsB: B yılı (opsiyonel) */
  function BarChart(chartProps){
    /* rowsA ve rowsB'yi label üzerinden merge et */
    var rowsA = (chartProps.rows||[]).slice(0,chartProps.topN||10);
    var rowsB = chartProps.rowsB || [];
    var mapB = {};
    rowsB.forEach(function(r){ mapB[r.label] = r.revenue||0; });
    var merged = rowsA.map(function(r){
      return Object.assign({},r,{A:r.revenue||r.A||0, B:mapB[r.label]||r.B||0});
    });
    if(!merged.length) return <div className="empty" style={{padding:20}}><p>Veri yok</p></div>;
    var maxVal = Math.max.apply(null, merged.map(function(r){return Math.max(r.A||0, r.B||0);})) || 1;
    var W=500, H=280, padL=80, padB=40, padT=20;
    var barsPerGroup = chartProps.compare ? 2 : 1;
    var barW = Math.max(6, Math.floor((W-padL-20)/(merged.length*barsPerGroup*1.4+1)));
    var groupW = barsPerGroup*barW + Math.max(4, Math.floor(barW*0.5));
    return (
      <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",maxWidth:W,height:"auto",display:"block"}}>
        {[0,0.25,0.5,0.75,1].map(function(t){
          var y = padT + (H-padT-padB)*(1-t);
          return <g key={t}>
            <line x1={padL} x2={W-10} y1={y} y2={y} stroke="var(--bd)" strokeWidth="0.5"/>
            <text x={padL-4} y={y+4} textAnchor="end" fontSize="9" fill="var(--tx3)">
              {chartProps.isPercent ? "%"+Math.round(maxVal*t) : Math.round(maxVal*t/1000)+"K"}
            </text>
          </g>;
        })}
        {merged.map(function(r,i){
          var x0 = padL + 8 + i * groupW;
          var hA = Math.max(1,(H-padT-padB) * (r.A||0) / maxVal);
          var hB = r.B>0 ? Math.max(1,(H-padT-padB) * r.B / maxVal) : 0;
          var label = String(r.label||r.displayName||"—");
          var shortLabel = label.length>12 ? label.slice(0,12)+"…" : label;
          var midX = x0 + (chartProps.compare ? barW : barW/2);
          return <g key={i}>
            <rect x={x0} y={H-padB-hA} width={barW} height={hA} fill="var(--bdI)" rx="2"/>
            {chartProps.compare&&hB>0&&<rect x={x0+barW+2} y={H-padB-hB} width={barW} height={hB} fill="#f59e0b" rx="2"/>}
            <text x={midX} y={H-padB+14} textAnchor="middle" fontSize="8" fill="var(--tx3)"
              transform={"rotate(-35,"+midX+","+(H-padB+14)+")"}>{shortLabel}</text>
          </g>;
        })}
        {chartProps.compare&&<g>
          <rect x={padL} y={4} width={10} height={8} fill="var(--bdI)" rx="1"/>
          <text x={padL+13} y={11} fontSize="9" fill="var(--tx2)">{yilA}</text>
          <rect x={padL+45} y={4} width={10} height={8} fill="#f59e0b" rx="1"/>
          <text x={padL+58} y={11} fontSize="9" fill="var(--tx2)">{yilB}</text>
        </g>}
      </svg>
    );
  }

  /* Aylık trend SVG */
  function TrendChart(chartProps){
    var rows = chartProps.rows||[];
    if(!rows.length) return <div className="empty" style={{padding:20}}><p>Veri yok</p></div>;
    var maxVal = Math.max.apply(null, rows.map(function(r){return Math.max(r.A||0,r.B||0);})) || 1;
    var W=480, H=220, padL=70, padB=36, padT=16;
    var bW = Math.max(12, Math.floor((W-padL-20)/(rows.length*2+1)));
    return (
      <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",maxWidth:W,height:"auto",display:"block"}}>
        {[0,0.5,1].map(function(t){
          var y=padT+(H-padT-padB)*(1-t);
          return <g key={t}>
            <line x1={padL} x2={W-10} y1={y} y2={y} stroke="var(--bd)" strokeWidth="0.5"/>
            <text x={padL-4} y={y+4} textAnchor="end" fontSize="9" fill="var(--tx3)">{Math.round(maxVal*t/1000)+"K"}</text>
          </g>;
        })}
        {rows.map(function(r,i){
          var x0 = padL+6+i*(bW*2+4);
          var hA = (H-padT-padB)*r.A/maxVal;
          var hB = (H-padT-padB)*r.B/maxVal;
          var mon = r.label ? r.label.slice(0,6) : r.month;
          return <g key={i}>
            <rect x={x0} y={H-padB-hA} width={bW} height={hA} fill="var(--bdI)" rx="1" opacity="0.85"/>
            {r.B>0&&<rect x={x0+bW+1} y={H-padB-hB} width={bW} height={hB} fill="#f59e0b" rx="1" opacity="0.85"/>}
            <text x={x0+bW} y={H-padB+12} textAnchor="middle" fontSize="8" fill="var(--tx3)" transform={"rotate(-30,"+(x0+bW)+","+(H-padB+12)+")"}>{mon}</text>
          </g>;
        })}
        <g>
          <rect x={padL} y={4} width={8} height={6} fill="var(--bdI)" rx="1"/>
          <text x={padL+11} y={10} fontSize="8" fill="var(--tx2)">{yilA}</text>
          <rect x={padL+35} y={4} width={8} height={6} fill="#f59e0b" rx="1"/>
          <text x={padL+46} y={10} fontSize="8" fill="var(--tx2)">{yilB}</text>
        </g>
      </svg>
    );
  }

  /* Karşılaştırma tablosu */
  function CmpTable(cmpProps){
    var rowsA = groupBy(dataA, cmpProps.key);
    var rowsB = groupBy(dataB, cmpProps.key);
    var mapB  = {};
    rowsB.forEach(function(r){mapB[r.label]=r.revenue;});
    var allMerged = rowsA.slice(0,cmpProps.topN||10).map(function(r){
      var bRev = mapB[r.label]||0;
      var diff = bRev>0 ? ((r.revenue-bRev)/bRev*100) : null;
      return Object.assign({},r,{bRevenue:bRev, diff:diff!==null?diff:null, diffSort:diff!==null?diff:-999});
    });
    var sortable = useSortable(allMerged, "revenue", "desc");
    var SortTh = sortable.SortTh;
    var merged = sortable.sorted;
    return (
      <div className="tw"><table>
        <thead><tr>
          <th>{cmpProps.colLabel||"Grup"}</th>
          <SortTh k="revenue">{yilA} Ciro</SortTh>
          <SortTh k="bRevenue">{yilB} Ciro</SortTh>
          <SortTh k="diffSort">Değişim</SortTh>
          <SortTh k="qty">{yilA} Adet</SortTh>
        </tr></thead>
        <tbody>
          {merged.length===0&&<tr><td colSpan={5}><div className="empty" style={{padding:16}}><p>Veri yok</p></div></td></tr>}
          {merged.map(function(r){
            var diffCls = r.diff===null?"":r.diff>0?"txS":r.diff<0?"txD":"tx2";
            return(<tr key={r.label}>
              <td style={{fontWeight:500,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.label}</td>
              <td><strong>{fmtTL(r.revenue)}</strong></td>
              <td style={{color:"var(--tx2)"}}>{r.bRevenue>0?fmtTL(r.bRevenue):"—"}</td>
              <td>{r.diff!==null?<span style={{color:"var(--"+diffCls+")",fontWeight:500}}>{r.diff>0?"+":""}{r.diff.toFixed(1)}%</span>:<span className="tc">—</span>}</td>
              <td>{r.qty}</td>
            </tr>);
          })}
        </tbody>
      </table></div>
    );
  }

  if(loading) return <div className="empty" style={{padding:60}}><i className="ti ti-refresh spin"/><p>Raporlar yükleniyor...</p></div>;

  var totalRevA = dataA.reduce(function(a,s){return a+s.revenue;},0);
  var totalRevB = dataB.reduce(function(a,s){return a+s.revenue;},0);
  var totalDiff = totalRevB>0 ? ((totalRevA-totalRevB)/totalRevB*100) : null;
  var trendRows = monthTrend();

  return (
    <div>
      {/* Kontrol paneli */}
      <div className="card mb4" style={{padding:"12px 16px"}}>
        <div className="fx g3g" style={{flexWrap:"wrap",alignItems:"flex-end"}}>
          <div>
            <label className="fl">Karşılaştırma Yılı A</label>            <select value={yilA} onChange={function(e){setYilA(e.target.value);}} style={{width:100}}>
              {years.map(function(y){return <option key={y}>{y}</option>;})}
            </select>
          </div>
          <div>
            <label className="fl">Karşılaştırma Yılı B</label>
            <select value={yilB} onChange={function(e){setYilB(e.target.value);}} style={{width:100}}>
              {years.map(function(y){return <option key={y}>{y}</option>;})}
            </select>
          </div>
          <div>
            <label className="fl">Top N</label>
            <select value={topN} onChange={function(e){setTopN(+e.target.value);}} style={{width:80}}>
              {[5,10,20,50].map(function(n){return <option key={n} value={n}>{n}</option>;})}
            </select>
          </div>
          <button className="btn bxs" onClick={loadAll}><i className="ti ti-refresh" aria-hidden="true"/>Yenile</button>
          <div>
            <label className="fl">Kategori Filtresi</label>
            <select value={catFilter} onChange={function(e){setCatFilter(e.target.value);}} style={{minWidth:140}}>
              {allCats.map(function(c){return <option key={c}>{c}</option>;})}
            </select>
          </div>
        </div>
      </div>

      {/* Özet kartlar */}
      <div className="g4 mb4">
        {[
          {lbl:yilA+" Ciro",val:fmtTL(totalRevA),ico:"ti-currency-lira"},
          {lbl:yilB+" Ciro",val:fmtTL(totalRevB),ico:"ti-currency-lira"},
          {lbl:"Değişim",val:totalDiff!==null?((totalDiff>0?"+":"")+totalDiff.toFixed(1)+"%"):"—",ico:"ti-trending-up",color:totalDiff>0?"var(--txS)":totalDiff<0?"var(--txD)":"inherit"},
          {lbl:yilA+" İşlem",val:dataA.length,ico:"ti-file-invoice"}
        ].map(function(s,i){return(
          <div key={i} className="sc">
            <i className={"ti "+s.ico} style={{fontSize:20,display:"block",marginBottom:6,color:"var(--tx2)"}} aria-hidden="true"/>
            <div className="lbl">{s.lbl}</div>
            <div className="val" style={{fontSize:18,color:s.color||"inherit"}}>{s.val}</div>
          </div>
        );})}
      </div>

      {/* Sekme menüsü */}
      <div className="tabs">
        {[["urun","Ürün Bazlı"],["musteri","Müşteri Bazlı"],["kategori","Kategori Bazlı"],["trend","Aylık Trend"],["karlilik_model","Model No Karlılık"],["karlilik_kat","Kategori Karlılık"],["aralik","Tarih Aralığı"]].map(function(x){return(
          <button key={x[0]} className={"tab"+(tab===x[0]?" on":"")} onClick={function(){setTab(x[0]);}}>{x[1]}</button>
        );})}
      </div>

      {/* ÜRÜN BAZLI */}
      {tab==="urun"&&<UrunBazliRapor
        dataA={dataA} dataB={dataB} yilA={yilA} yilB={yilB}
        topN={topN} enrichedFiltered={enrichedFiltered}
        profitGroupBy={profitGroupBy} groupBy={groupBy}
      />}

      {/* MÜŞTERİ BAZLI */}
      {tab==="musteri"&&<MusteriBazliRapor
        dataA={dataA} dataB={dataB} yilA={yilA} yilB={yilB}
        topN={topN} profitGroupBy={profitGroupBy} groupBy={groupBy}
      />}

      {/* KATEGORİ BAZLI */}
      {tab==="kategori"&&<div className="g2">
        <div className="card">
          <div className="ct">Kategori Bazlı Satış — {yilA} vs {yilB}</div>
          <BarChart rows={groupBy(dataA,"category")} rowsB={groupBy(dataB,"category")} topN={topN} compare={true}/>
        </div>
        <div className="card" style={{padding:0}}>
          <div style={{padding:"10px 16px",borderBottom:".5px solid var(--bd)",fontWeight:500,fontSize:13}}>Kategori Karşılaştırma</div>
          <CmpTable key_="category" colLabel="Kategori" topN={topN}/>
        </div>
      </div>}

      {/* AYLIK TREND */}
      {tab==="trend"&&<div>
        <div className="card mb4">
          <div className="ct">Aylık Ciro Trendi — {yilA} (mavi) vs {yilB} (turuncu)</div>
          <TrendChart rows={trendRows}/>
        </div>
        <div className="card" style={{padding:0}}>
          <div className="tw"><table>
            <thead>
              <tr style={{background:"var(--bg2)"}}>
                <th rowSpan={2}>Ay</th>
                <th colSpan={2} style={{textAlign:"center",color:"var(--bdI)"}}>{yilA}</th>
                <th colSpan={2} style={{textAlign:"center",color:"#f59e0b"}}>{yilB}</th>
