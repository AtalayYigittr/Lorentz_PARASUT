function EslestirmeEkrani() {
  var _loading=useState(true); var loading=_loading[0]; var setLoading=_loading[1];
  var _items=useState([]); var items=_items[0]; var setItems=_items[1];
  var _products=useState([]); var products=_products[0]; var setProducts=_products[1];
  var _categories=useState([]); var categories=_categories[0]; var setCategories=_categories[1];
  var _mappings=useState({}); var mappings=_mappings[0]; var setMappings=_mappings[1];
  var _saving=useState(false); var saving=_saving[0]; var setSaving=_saving[1];
  var _saved=useState(false); var saved=_saved[0]; var setSaved=_saved[1];
  var _filter=useState("all"); var filter=_filter[0]; var setFilter=_filter[1];
  var _search=useState(""); var search=_search[0]; var setSearch=_search[1];
  var _expandedRow=useState(null); var expandedRow=_expandedRow[0]; var setExpandedRow=_expandedRow[1];
  /* Manuel giriş: hangi satır manuel mod açık */
  var _manualRow=useState(null); var manualRow=_manualRow[0]; var setManualRow=_manualRow[1];
  var _manualVal=useState(""); var manualVal=_manualVal[0]; var setManualVal=_manualVal[1];
  /* Çapraz öneri: {parasutName: [{otherName, score}]} */
  var _crossSug=useState({}); var crossSug=_crossSug[0]; var setCrossSug=_crossSug[1];

  useEffect(function(){ loadData(); }, []);

  function loadData(){
    setLoading(true);
    fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"getEslestirmeDurumu"})})
      .then(function(r){return r.json();}).then(function(res){
        setLoading(false);
        if(!res.ok){alert("Hata: "+(res.error||""));return;}
        var d = res.data && res.data.data ? res.data.data : res.data;
        setItems(d.items||[]);
        setProducts(d.productList||[]);
        /* Mevcut eşleştirmeleri mappings state'ine yükle */
        var m = {};
        (d.items||[]).forEach(function(it){
          m[it.parasutName] = {
            systemProductId: String(it.systemProductId||""),
            systemModelNo: it.systemModelNo||"",
            category: it.category||"",
            confirmed: it.confirmed||""
          };
        });
        setMappings(m);
        /* Tüm kategorileri topla: sistem ürünlerinden + mevcut eşleştirmelerden */
        var catSet = {};
        (d.productList||[]).forEach(function(p){ if(p.category) catSet[p.category.trim()]=1; });
        (d.items||[]).forEach(function(it){ if(it.category) catSet[it.category.trim()]=1; });
        setCategories(Object.keys(catSet).filter(Boolean).sort());
      }).catch(function(e){ setLoading(false); alert("Bağlantı hatası: "+e.message); });
  }

  /* Arama destekli genel dropdown bileşeni */

          </div>

              onMouseEnter={function(e){e.currentTarget.style.background="var(--bg2)";}} onMouseLeave={function(e){e.currentTarget.style.background="";}}
            >{ssProps.emptyOption}</div>}
            {ssProps.manuelOption&&<div onMouseDown={function(e){e.preventDefault();choose({value:"__MANUEL__",label:"__MANUEL__"});}}
              style={{padding:"7px 10px",fontSize:12,cursor:"pointer",color:"var(--txI)",borderBottom:".5px solid var(--bd)",fontWeight:500}}
              onMouseEnter={function(e){e.currentTarget.style.background="var(--bgI)";}} onMouseLeave={function(e){e.currentTarget.style.background="";}}

              return(<div key={o.value} onMouseDown={function(e){e.preventDefault();choose(o);}}
                style={{padding:"7px 10px",fontSize:12,cursor:"pointer",background:isSel?"var(--bgI)":"",color:isSel?"var(--txI)":"var(--tx)",borderBottom:".5px solid var(--bd)"}}
                onMouseEnter={function(e){if(!isSel)e.currentTarget.style.background="var(--bg2)";}}
                onMouseLeave={function(e){if(!isSel)e.currentTarget.style.background="";}}>
                {o.label}

  /* Kategori autocomplete input */
  function CategoryInput(ciProps) {
    var _val=useState(ciProps.value||""); var val=_val[0]; var setVal=_val[1];
    var _open=useState(false); var open=_open[0]; var setOpen=_open[1];
    var inputRef=useRef();
    useEffect(function(){if(val!==ciProps.value)setVal(ciProps.value||"");}, [ciProps.value]);
    var suggestions=val.length>=1
      ? categories.filter(function(c){return c.toLowerCase().includes(val.toLowerCase())&&c.toLowerCase()!==val.toLowerCase();}).slice(0,8)
      : categories.slice(0,8);
    function choose(cat){setVal(cat);setOpen(false);ciProps.onChange(cat);}
    function handleChange(e){var v=e.target.value;setVal(v);setOpen(true);ciProps.onChange(v);}

            {suggestions.map(function(cat){return(
              <div key={cat} onMouseDown={function(e){e.preventDefault();choose(cat);}}
                style={{padding:"7px 12px",fontSize:12,cursor:"pointer",borderBottom:".5px solid var(--bd)"}}
                onMouseEnter={function(e){e.currentTarget.style.background="var(--bgI)";e.currentTarget.style.color="var(--txI)";}}
                onMouseLeave={function(e){e.currentTarget.style.background="";e.currentTarget.style.color="";}}>
                {cat}
              </div>
            );})}
          </div>
        )}
      </div>
    );

  /* fuzzyScore (client-side) */
  function clientFuzzy(a, b){
    if(!a||!b) return 0;
    var wa=String(a).toUpperCase().replace(/[^\w\s]/g,"").split(/\s+/).filter(Boolean);
    var wb=String(b).toUpperCase().replace(/[^\w\s]/g,"").split(/\s+/).filter(Boolean);
    if(!wa.length||!wb.length) return 0;
    var common=wa.filter(function(w){return wb.indexOf(w)>=0;}).length;
    return common/Math.max(wa.length,wb.length);
  }

  /* Bir koda/modele çapraz öneri hesapla:
     Bu kod/modelNo ile benzer Paraşüt ürünlerini bul (eşleşmemiş olanlar öncelikli) */
  function calcCrossSuggestions(sourcePName, modelNo){
    if(!modelNo) return;
    var suggestions = [];
    items.forEach(function(it){
      if(it.parasutName===sourcePName) return; // kendisi hariç
      var score = clientFuzzy(it.parasutName, modelNo);
      if(score >= 0.25) { // düşük eşik — kullanıcı karar versin
        suggestions.push({ parasutName:it.parasutName, score:Math.round(score*100) });
      }
    });
    suggestions.sort(function(a,b){return b.score-a.score;});
    setCrossSug(function(prev){
      var next=Object.assign({},prev);
      next[sourcePName] = suggestions.slice(0,5);
      return next;
    });
  }

  function updateMapping(pName, field, val){
    setMappings(function(prev){
      var next = Object.assign({},prev);
      next[pName] = Object.assign({}, next[pName]||{}, {[field]:val});
      if(field==="systemProductId" && val){
        /* Dropdown'dan seçim: sistemdeki ürün bilgilerini doldur */
        var p = products.find(function(x){return String(x.id)===String(val);});
        if(p){
          next[pName].systemModelNo = p.modelNo;
          if(!next[pName].category) next[pName].category = p.category||"";
          /* Çapraz öneri için modelNo'yu kullan */
          setTimeout(function(){calcCrossSuggestions(pName, p.modelNo);},0);
        }
      }
      if(field==="manualCode" && val){
        /* Manuel giriş: systemModelNo olarak kaydet, systemProductId "MANUEL" prefix'li */
        next[pName].systemProductId = "M:"+val;
        next[pName].systemModelNo   = val;
        /* Çapraz öneri: manuel koda benzer Paraşüt isimlerini bul */
        setTimeout(function(){calcCrossSuggestions(pName, val);},0);
      }
      return next;
    });
  }

  function confirmAll(){
    setMappings(function(prev){
      var next = Object.assign({},prev);
      Object.keys(next).forEach(function(k){
        if(next[k].systemProductId || next[k].systemModelNo) next[k].confirmed = "manual";
      });
      return next;
    });
  }

  function saveAll(){
    setSaving(true); setSaved(false);
    var toSave = Object.keys(mappings).map(function(pName){
      var m = mappings[pName]||{};
      return { parasutName:pName, systemProductId:m.systemProductId||"",
               systemModelNo:m.systemModelNo||"", category:m.category||"", confirmed:m.confirmed||"" };
    }).filter(function(m){ return m.systemProductId || m.category; });
    fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"saveEslestirmeler", mappings:toSave})})
      .then(function(r){return r.json();}).then(function(res){
        setSaving(false);
        if(res.ok){
          setSaved(true);
          setTimeout(function(){setSaved(false);},3000);
          /* Yeni girilen kategorileri listeye ekle */
          setCategories(function(prev){
            var catSet = {};
            prev.forEach(function(c){ catSet[c]=1; });
            toSave.forEach(function(m){ if(m.category) catSet[m.category.trim()]=1; });
            return Object.keys(catSet).filter(Boolean).sort();
          });
          /* Manuel eklenen ürünleri local products state'ine ekle
             ve M: prefix'li systemProductId'leri gerçek id'lerle güncelle */
          var d2 = res.data && res.data.data ? res.data.data : res.data;
          if(d2 && d2.newProducts > 0){
            /* Güncel Products listesini çek */
            fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
              body:JSON.stringify({action:"getEslestirmeDurumu"})})
              .then(function(r){return r.json();}).then(function(r2){
                if(r2.ok){
                  var d3 = r2.data && r2.data.data ? r2.data.data : r2.data;
                  setProducts(d3.productList||[]);
                  /* Mappings'deki M: prefix'li ID'leri de güncelle */
                  var m3 = {};
                  (d3.items||[]).forEach(function(it){
                    m3[it.parasutName]={
                      systemProductId:String(it.systemProductId||""),
                      systemModelNo:it.systemModelNo||"",
                      category:it.category||"",
                      confirmed:it.confirmed||""
                    };
                  });
                  setMappings(m3);
                }
              });
          }
        }
        else alert("Kaydetme hatası: "+(res.error||""));
      }).catch(function(e){ setSaving(false); alert("Bağlantı hatası: "+e.message); });
  }

  var filtered = items.filter(function(it){
    var m = mappings[it.parasutName]||{};
    var matchFilter = filter==="all" || (filter==="matched"&&m.systemProductId) || (filter==="unmatched"&&!m.systemProductId) || (filter==="confirmed"&&(m.confirmed==="manual"||m.confirmed==="auto"));
    var matchSearch = !search || it.parasutName.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  var totalMatched = items.filter(function(it){ return !!(mappings[it.parasutName]||{}).systemProductId; }).length;
  var totalConfirmed = items.filter(function(it){ var c=(mappings[it.parasutName]||{}).confirmed; return c==="manual"||c==="auto"; }).length;

  if(loading) return <div className="empty" style={{padding:60}}><i className="ti ti-refresh spin"/><p>Eşleştirme verileri yükleniyor...</p></div>;

  return (
    <div>
      {/* Özet */}
      <div className="g3 mb4">
        <div className="sc"><div className="lbl">Toplam Benzersiz Ürün</div><div className="val">{items.length}</div></div>
        <div className="sc"><div className="lbl">Eşleştirilmiş</div><div className="val" style={{color:totalMatched===items.length?"var(--txS)":"inherit"}}>{totalMatched}</div></div>
        <div className="sc"><div className="lbl">Onaylanmış</div><div className="val" style={{color:totalConfirmed===items.length?"var(--txS)":"inherit"}}>{totalConfirmed}</div></div>
      </div>

      {/* Araç çubuğu */}
      <div className="fxb mb3" style={{gap:8,flexWrap:"wrap"}}>
        <div className="fx g2g" style={{flex:1,flexWrap:"wrap"}}>
          <div className="swrap" style={{minWidth:220}}>
            <i className="ti ti-search si" aria-hidden="true"/>
            <input placeholder="Paraşüt ürün adı ara..." value={search} onChange={function(e){setSearch(e.target.value);}}/>
          </div>
          <select value={filter} onChange={function(e){setFilter(e.target.value);}} style={{width:"auto"}}>
            <option value="all">Tümü ({items.length})</option>
            <option value="unmatched">Eşleşmemiş ({items.length-totalMatched})</option>
            <option value="matched">Eşleşmiş ({totalMatched})</option>
            <option value="confirmed">Onaylanmış ({totalConfirmed})</option>
          </select>
        </div>
        <div className="fx g2g">
          <button className="btn bsm" onClick={confirmAll}><i className="ti ti-circle-check" aria-hidden="true"/>Tümünü Onayla</button>
          <button className="btn bsm" onClick={loadData}><i className="ti ti-refresh" aria-hidden="true"/>Yenile</button>
          <button className="btn btnP bsm" onClick={saveAll} disabled={saving}>
            {saving?<i className="ti ti-refresh spin" aria-hidden="true"/>:<i className="ti ti-device-floppy" aria-hidden="true"/>}
            {saving?"Kaydediliyor...":"Eşleştirmeleri Kaydet"}
          </button>
          {saved&&<span className="badge bs">Kaydedildi ✓</span>}        </div>
      </div>

      {/* Eşleştirme tablosu */}
      <div className="card" style={{padding:0}}>
        <div className="tw"><table>
          <thead><tr><th style={{width:32}}></th><th>Paraşüt Ürün Adı</th><th>Satış / Ciro</th><th>Benzerlik</th><th>Sistem Ürünü</th><th>Kategori</th><th>Durum</th></tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={7}><div className="empty" style={{padding:20}}><p>Eşleşen kayıt yok</p></div></td></tr>}
            {filtered.map(function(it){
              var m = mappings[it.parasutName]||{};
              var isConfirmed = m.confirmed==="manual"||m.confirmed==="auto";
              var isExpanded  = expandedRow===it.parasutName;
              var isManual    = manualRow===it.parasutName;
              var isManuelVal = m.systemProductId && String(m.systemProductId).indexOf("M:")=== 0;
              var scoreColor  = it.autoScore>=80?"var(--txS)":it.autoScore>=40?"var(--txW)":"var(--txD)";
              var myCross     = crossSug[it.parasutName]||[];
              /* Çapraz önerilerden henüz eşleşmemiş olanları filtrele */
              var activeCross = myCross.filter(function(c){
                var cm = mappings[c.parasutName]||{};
                return !cm.systemProductId && !cm.systemModelNo;
              });
              return([
                <tr key={it.parasutName} style={{background:isConfirmed?"var(--bgS)":m.systemProductId?"var(--bgI)":"inherit"}}>
                  <td>
                    <button className="btn bxs" style={{padding:"3px 6px",border:"none"}} onClick={function(){setExpandedRow(isExpanded?null:it.parasutName);}}>
                      <i className={"ti ti-"+(isExpanded?"chevron-up":"chevron-down")} aria-hidden="true"/>
                    </button>
                  </td>
                  <td>
                    <div style={{fontWeight:500,fontSize:12}}>{it.parasutName}</div>
                    <div style={{marginTop:2}}>
                      {(it.sources||[]).indexOf("satis")>=0&&<span style={{fontSize:9,background:"var(--bgI)",color:"var(--txI)",padding:"1px 5px",borderRadius:8,marginRight:3}}>Satış</span>}
                      {(it.sources||[]).indexOf("satinalma")>=0&&<span style={{fontSize:9,background:"var(--bgS)",color:"var(--txS)",padding:"1px 5px",borderRadius:8}}>Satın Alma</span>}
                    </div>
                  </td>
                  <td style={{fontSize:12}}>
                    <div>{it.salesCount} sat.</div>
                    <div style={{color:"var(--tx2)",fontSize:11}}>{fmtTL(it.totalRevenue)}</div>
                  </td>
                  <td>
                    <span style={{fontSize:12,fontWeight:500,color:scoreColor}}>%{it.autoScore}</span>
                  </td>
                  <td>
                    {/* SearchableSelect VEYA manuel giriş */}
                    {!isManual&&!isManuelVal?
                      <div>
                        <SearchableSelect
                          value={m.systemProductId||""}
                          placeholder="— Eşleştirilmemiş —"
                          emptyOption="— Eşleştirilmemiş —"
                          manuelOption={true}
                          minWidth={180}
                          options={products.map(function(p){return {value:String(p.id),label:p.modelNo+(p.skuId&&p.skuId!==p.modelNo?" ("+p.skuId+")":"")};}) }
                          onChange={function(v){
                            if(v==="__MANUEL__"){ setManualRow(it.parasutName); setManualVal(m.systemModelNo||""); return; }
                            if(v===""){updateMapping(it.parasutName,"systemProductId",""); return;}
                            updateMapping(it.parasutName,"systemProductId",v);
                            updateMapping(it.parasutName,"confirmed","manual");
                          }}
                        />
                        {m.systemModelNo&&<div style={{fontSize:10,color:"var(--tx3)",marginTop:2}}>{m.systemModelNo}</div>}
                      </div>
                    :
                      /* Manuel giriş modu */
                      <div>
                        <div className="fx g1" style={{marginBottom:4}}>
                          <input
                            value={isManual?manualVal:(m.systemModelNo||"")}
                            onChange={function(e){setManualVal(e.target.value);}}
                            placeholder="Kod veya model girin..."
                            style={{fontSize:12,flex:1,minWidth:100}}
                            autoFocus={isManual}
                          />
                          <button className="btn bxs btnP" onClick={function(){
                            if(!manualVal.trim()){alert("Kod boş olamaz.");return;}
                            updateMapping(it.parasutName,"manualCode",manualVal.trim());
                            updateMapping(it.parasutName,"confirmed","manual");
                            setManualRow(null); setManualVal("");
                          }} title="Onayla"><i className="ti ti-check" aria-hidden="true"/></button>
                          <button className="btn bxs" onClick={function(){
                            setManualRow(null); setManualVal("");
                            /* Manuel moddan çıkınca sisteme dön */
                            if(isManuelVal){
                              updateMapping(it.parasutName,"systemProductId","");
                              updateMapping(it.parasutName,"systemModelNo","");
                            }
                          }} title="İptal"><i className="ti ti-x" aria-hidden="true"/></button>
                        </div>
                        {isManuelVal&&<div style={{fontSize:10,color:"var(--txW)"}}>✏️ Manuel: {m.systemModelNo}</div>}
                        {!isManuelVal&&<div style={{fontSize:10,color:"var(--tx3)"}}>Kodu girin, ✓ ile onaylayın</div>}
                      </div>
                    }
                    {/* Manuel değeri olan satır için düzenle butonu */}
                    {isManuelVal&&!isManual&&<button className="btn bxs" style={{marginTop:4,fontSize:10}} onClick={function(){setManualRow(it.parasutName);setManualVal(m.systemModelNo||"");}}>
                      <i className="ti ti-edit" aria-hidden="true"/> Düzenle
                    </button>}
                  </td>
                  <td>
                    <CategoryInput
                      value={m.category||""}
                      onChange={function(v){updateMapping(it.parasutName,"category",v);}}
                    />
                  </td>
                  <td>
                    {isConfirmed?<span className="badge bs">Onaylı</span>:m.systemProductId?<span className="badge bw">Bekliyor</span>:<span className="badge bd_">Eşleşmedi</span>}
                  </td>
                </tr>,
                /* Çapraz öneri bandı */
                activeCross.length>0&&<tr key={it.parasutName+"_cross"} style={{background:"var(--bgW)"}}>
                  <td colSpan={7} style={{padding:"6px 16px"}}>
                    <div className="fx g2g" style={{flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:11,color:"var(--txW)",fontWeight:500}}>
                        <i className="ti ti-bulb" aria-hidden="true"/> Bu kod ile benzer {activeCross.length} ürün de eşleştirilebilir:
                      </span>
                      {activeCross.map(function(c){return(
                        <div key={c.parasutName} className="fx g1" style={{background:"var(--bg)",borderRadius:"var(--r)",padding:"3px 8px",border:".5px solid var(--bd2)"}}>
                          <span style={{fontSize:11,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={c.parasutName}>
                            <span style={{color:"var(--tx3)",marginRight:4}}>%{c.score}</span>{c.parasutName}
                          </span>
                          <button className="btn bxs btnP" style={{padding:"2px 6px",fontSize:10}} onClick={function(){
                            /* Aynı kodu bu ürüne de ata */
                            var srcM = mappings[it.parasutName]||{};
                            updateMapping(c.parasutName, "manualCode", srcM.systemModelNo||"");
                            updateMapping(c.parasutName, "confirmed", "manual");
                            if(!m.category){ } else updateMapping(c.parasutName,"category",srcM.category||"");
                          }}>Bu kodu ata</button>
                          <button className="btn bxs" style={{padding:"2px 6px",fontSize:10}} onClick={function(){
                            /* Bu öneriyi reddet — crossSug'dan çıkar */
                            setCrossSug(function(prev){
                              var next=Object.assign({},prev);
                              next[it.parasutName]=(next[it.parasutName]||[]).filter(function(x){return x.parasutName!==c.parasutName;});
                              return next;
                            });
                          }}>✕</button>
                        </div>
                      );})}
                    </div>
                  </td>
                </tr>,
                /* Genişletilmiş öneri satırı */
                isExpanded&&<tr key={it.parasutName+"_exp"} style={{background:"var(--bg2)"}}>
                  <td colSpan={7} style={{padding:"8px 16px"}}>
                    <p style={{fontSize:11,color:"var(--tx2)",marginBottom:6,fontWeight:500}}>Sistem Ürünü Önerileri:</p>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {it.suggestions.map(function(s){return(
                        <button key={s.id} className={"btn bxs"+(String(m.systemProductId)===String(s.id)?" btnP":"")} onClick={function(){
                          updateMapping(it.parasutName,"systemProductId",String(s.id));
                          updateMapping(it.parasutName,"confirmed","manual");
                          setManualRow(null);
                        }} style={{fontSize:11}}>
                          <span style={{color:"var(--tx3)",marginRight:4}}>%{s.score}</span>{s.modelNo}
                        </button>
                      );})}
                    </div>
                  </td>
                </tr>
              ]);
            })}
          </tbody>
        </table></div>
      </div>

      <div className="infobox ibI mt3" style={{fontSize:11}}>
        Eşleştirmeleri kaydettikten sonra <strong>Entegrasyonlar → "Paraşüt'ten Satışları Çek"</strong> ile yeniden senkronize edin — yeni eşleştirme tablosu satış raporlarına otomatik yansıyacak.
      </div>
    </div>
  );
}

/* ── SATIN ALMA GEÇMİŞİ ── */
function SatinAlmaGecmisi(props) {
  var _loading=useState(true); var loading=_loading[0]; var setLoading=_loading[1];
  var _satinAlma=useState([]); var satinAlma=_satinAlma[0]; var setSatinAlma=_satinAlma[1];
  var _eslestirme=useState([]); var eslestirme=_eslestirme[0]; var setEslestirme=_eslestirme[1];
  var _search=useState(""); var search=_search[0]; var setSearch=_search[1];
  var _catFilter=useState("Tümü"); var catFilter=_catFilter[0]; var setCatFilter=_catFilter[1];
  var _dateFrom=useState(""); var dateFrom=_dateFrom[0]; var setDateFrom=_dateFrom[1];
  var _dateTo=useState(""); var dateTo=_dateTo[0]; var setDateTo=_dateTo[1];
  var _selSku=useState(null); var selSku=_selSku[0]; var setSelSku=_selSku[1];

  useEffect(function(){ loadData(); }, []);

  function loadData(){
    setLoading(true);
    Promise.all([
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"get",sheet:"ParasutSatinAlma"})}).then(function(r){return r.json();}),
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"get",sheet:"ParasutEslestirme"})}).then(function(r){return r.json();})
    ]).then(function(results){
      setLoading(false);
      if(results[0].ok) setSatinAlma(results[0].data||[]);
      if(results[1].ok) setEslestirme(results[1].data||[]);
    }).catch(function(){ setLoading(false); });
  }

  /* Eşleştirme map: parasutName (normalize) → {systemModelNo, category} */
  var nameToSku = {};
  eslestirme.forEach(function(e){
    if(e.parasutName && e.systemModelNo) {
      /* Hem orijinal hem normalize haliyle ekle */
      nameToSku[String(e.parasutName)] = e;
      nameToSku[String(e.parasutName).trim().toUpperCase()] = e;
    }
  });

  /* Paraşüt satın alma faturalarını systemModelNo bazında zenginleştir */
  var enriched = satinAlma.map(function(row){
    var pName = String(row.productName||"");
    /* Önce tam eşleşme, sonra normalize eşleşme dene */
    var esl = nameToSku[pName] || nameToSku[pName.trim().toUpperCase()] || {};
    var systemModelNo = esl.systemModelNo || "";
    /* Eşleştirme yoksa orijinal açıklamayı göster ama farklı işaretle */
    var sku = systemModelNo || pName || "—";
    var category = esl.category || "—";
    var matched = !!systemModelNo;
    var date = String(row.invoiceDate||"").slice(0,10);
    var qty = Number(row.qty)||0;
    var unitPrice = Number(row.unitPrice)||0;
    return Object.assign({},row,{
      sku: sku,
      category: category,
      date: date,
      qty: qty,
      unitPrice: unitPrice,
      totalCost: qty * unitPrice,
      parasutName: pName,
      matched: matched
    });
  });

  /* systemModelNo bazında özet */
  var bySku = {};
  enriched.forEach(function(row){
    var k = row.sku;
    if(!bySku[k]) bySku[k]={sku:k, category:row.category, totalQty:0, totalCost:0, invoiceCount:0, lastDate:"", avgUnit:0, matched:row.matched, rows:[]};
    bySku[k].totalQty   += row.qty;
    bySku[k].totalCost  += row.totalCost;
    bySku[k].invoiceCount++;
    bySku[k].rows.push(row);
    if(row.matched) bySku[k].matched = true; /* en az biri eşleştiyse matched */
    if(!bySku[k].lastDate || row.date > bySku[k].lastDate) bySku[k].lastDate = row.date;
  });
  Object.values(bySku).forEach(function(s){
    s.avgUnit = s.totalQty>0 ? s.totalCost/s.totalQty : 0;
  });

  /* Kategoriler */
  var cats = ["Tümü"].concat(Array.from(new Set(Object.values(bySku).map(function(s){return s.category;}).filter(function(c){return c&&c!=="—";}))).sort());

  /* Filtrelenmiş SKU listesi */
  var skuSortable = useSortable(
    Object.values(bySku).filter(function(r){
      var qq = search.toLowerCase();
      var matchQ = !qq || r.sku.toLowerCase().includes(qq) || r.category.toLowerCase().includes(qq);
      var matchC = catFilter==="Tümü" || r.category===catFilter;
      return matchQ && matchC;
    }),
    "totalCost", "desc"
  );
  var SortThSku = skuSortable.SortTh;

  /* Seçili SKU'nun detay satırları */
  var selRows = selSku
    ? (bySku[selSku]||{rows:[]}).rows.filter(function(r){
        if(dateFrom && r.date < dateFrom) return false;
        if(dateTo   && r.date > dateTo)   return false;
        return true;
      }).sort(function(a,b){return a.date>b.date?-1:1;})
    : [];

  var detailSortable = useSortable(selRows, "date", "desc");
  var SortThD = detailSortable.SortTh;

  if(loading) return <div className="empty" style={{padding:40}}><i className="ti ti-refresh spin"/><p>Yükleniyor...</p></div>;

  if(!satinAlma.length) return (
    <div className="infobox ibW">
      Satın alma verisi bulunamadı. <strong>Entegrasyonlar → "Satın Almaları Çek"</strong> butonuyla önce veri çekin.
    </div>
  );

  return (
    <div>
      <div className="fxb mb3" style={{gap:8,flexWrap:"wrap"}}>
        <div className="swrap" style={{flex:1,maxWidth:320}}>
          <i className="ti ti-search si" aria-hidden="true"/>
          <input placeholder="SKU ID veya kategori ara..." value={search} onChange={function(e){setSearch(e.target.value);}}/>
        </div>
        <select value={catFilter} onChange={function(e){setCatFilter(e.target.value);}} style={{width:"auto",minWidth:130}}>
          {cats.map(function(c){return <option key={c}>{c}</option>;})}
        </select>
        <button className="btn bxs" onClick={loadData}><i className="ti ti-refresh" aria-hidden="true"/>Yenile</button>
      </div>

      <div className="g2">
        {/* Sol: SKU bazlı özet */}
        <div className="card" style={{padding:0}}>
          <div style={{padding:"10px 16px",borderBottom:".5px solid var(--bd)",fontWeight:500,fontSize:13}}>
            System Model No Bazlı Satın Alma Özeti ({skuSortable.sorted.length})
          </div>
          <div className="tw"><table>
            <thead><tr>
              <SortThSku k="sku">System Model No</SortThSku>
              <th>Kategori</th>
              <SortThSku k="totalQty">Toplam Adet</SortThSku>
              <SortThSku k="totalCost">Toplam Maliyet</SortThSku>
              <SortThSku k="avgUnit">Ort. Birim</SortThSku>
              <SortThSku k="invoiceCount">Fatura</SortThSku>
              <SortThSku k="lastDate">Son Tarih</SortThSku>
            </tr></thead>
            <tbody>
              {skuSortable.sorted.length===0&&<tr><td colSpan={7}><div className="empty" style={{padding:20}}><p>Kayıt bulunamadı</p></div></td></tr>}
              {skuSortable.sorted.map(function(r){return(
                <tr key={r.sku} style={{cursor:"pointer",background:selSku===r.sku?"var(--bgI)":"inherit"}}
                  onClick={function(){setSelSku(r.sku===selSku?null:r.sku);}}>
                  <td style={{fontWeight:500}}>
                    {r.sku}
                    {!r.matched&&<span style={{marginLeft:4,fontSize:9,color:"var(--txW)",background:"var(--bgW)",padding:"1px 4px",borderRadius:3}}>eşleşmemiş</span>}
                  </td>
                  <td><span className="badge bi" style={{fontSize:10}}>{r.category}</span></td>
                  <td>{r.totalQty}</td>
                  <td><strong>{fmtTL(r.totalCost)}</strong></td>
                  <td>{fmtTL(r.avgUnit)}</td>
                  <td>{r.invoiceCount}</td>
                  <td style={{fontSize:12}}>{r.lastDate||"—"}</td>
                </tr>
              );})}
            </tbody>
          </table></div>
        </div>

        {/* Sağ: Seçili SKU'nun fatura detayları */}
        <div className="card">
          {!selSku&&<div className="empty"><i className="ti ti-shopping-cart"/><p>Sol listeden bir SKU seçin</p></div>}
          {selSku&&<>
            <div className="ct fxb" style={{marginBottom:8}}>
              <span><strong>{selSku}</strong> — Fatura Geçmişi</span>
              <div className="fx g2g">
                <input type="date" value={dateFrom} onChange={function(e){setDateFrom(e.target.value);}} style={{fontSize:11,width:120}} title="Başlangıç"/>
                <input type="date" value={dateTo} onChange={function(e){setDateTo(e.target.value);}} style={{fontSize:11,width:120}} title="Bitiş"/>
                {(dateFrom||dateTo)&&<button className="btn bxs" onClick={function(){setDateFrom("");setDateTo("");}}><i className="ti ti-x" aria-hidden="true"/></button>}
              </div>
            </div>
            {bySku[selSku]&&<div className="g3 mb3">
              <div className="sc"><div className="lbl">Toplam Alınan</div><div className="val">{bySku[selSku].totalQty} ad</div></div>
              <div className="sc"><div className="lbl">Toplam Tutar</div><div className="val">{fmtTL(bySku[selSku].totalCost)}</div></div>
              <div className="sc"><div className="lbl">Ağ. Ort. Birim</div><div className="val">{fmtTL(bySku[selSku].avgUnit)}</div></div>
            </div>}
            <div className="tw"><table>
              <thead><tr>
                <SortThD k="date">Tarih</SortThD>
                <th>Fatura No</th>
                <th>Tedarikçi</th>
                <th>Fatura Açıklaması</th>
                <SortThD k="qty">Adet</SortThD>
                <SortThD k="unitPrice">Birim Fiyat</SortThD>
                <SortThD k="totalCost">Toplam</SortThD>
              </tr></thead>
              <tbody>
                {detailSortable.sorted.length===0&&<tr><td colSpan={7}><div className="empty" style={{padding:12}}><p>Bu tarih aralığında kayıt yok</p></div></td></tr>}
                {detailSortable.sorted.map(function(r,i){return(
                  <tr key={i}>
                    <td style={{fontSize:12,whiteSpace:"nowrap"}}>{r.date}</td>
                    <td style={{fontSize:11}}>{r.invoiceNo||"—"}</td>
                    <td style={{fontSize:12}}>{String(r.contactName||"—")}</td>
                    <td style={{fontSize:11,color:"var(--tx2)",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={r.parasutName}>{r.parasutName||"—"}</td>
                    <td>{r.qty}</td>
                    <td>{fmtTL(r.unitPrice)}</td>
                    <td><strong>{fmtTL(r.totalCost)}</strong></td>
                  </tr>
                );})}
              </tbody>
            </table></div>
          </>}
        </div>
      </div>
    </div>
  );
}

/* ── SKU EŞİTLEME ── */
function SkuMap(props) {
  var _sh=useState(false); var sh=_sh[0]; var setSh=_sh[1];
  var _f=useState({primarySku:"",aliases:""}); var fm=_f[0]; var setFm=_f[1];
  function s(k){return function(e){setFm(function(f){var n=Object.assign({},f);n[k]=e.target.value;return n;});};}
  function add(){
    if(!fm.primarySku)return;
    var al=fm.aliases.split(",").map(function(a){return a.trim();}).filter(Boolean);
    props.onAdd({id:Date.now(),primarySku:fm.primarySku,aliases:al});
    setSh(false);setFm({primarySku:"",aliases:""});
  }
  return (
    <div>
      <div className="fxb mb4">
        <div><h2 style={{fontSize:15,fontWeight:500}}>SKU Eşitleme</h2><p style={{fontSize:12,color:"var(--tx2)",marginTop:2}}>Aynı ürünün farklı EAN/SKU kodlarını birleştirin</p></div>
        {props.role==="admin"&&<button className="btn btnP" onClick={function(){setSh(true);}}><i className="ti ti-plus" aria-hidden="true"/>Eşleme Ekle</button>}
      </div>
      <div className="infobox ibW mb4">Eşleme yapılınca alias kodlu stok girişleri ana SKU stoğuna birleşir.</div>
      <div className="card" style={{padding:0}}><div className="tw"><table>
        <thead><tr><th>Ana SKU</th><th>Alias Kodlar</th><th>Ürün</th><th></th></tr></thead>
        <tbody>
          {props.skuMap.length===0&&<tr><td colSpan={4}><div className="empty" style={{padding:20}}><p>Eşleme yok</p></div></td></tr>}
          {props.skuMap.map(function(m){
            var p=props.products.find(function(x){return x.skuId===m.primarySku;});
            return(<tr key={m.id}>
              <td><span className="badge bi">{m.primarySku}</span></td>
              <td>{(m.aliases||[]).map(function(a,i){return <span key={i} className="badge bw" style={{marginRight:4}}>{a}</span>;})}</td>
              <td>{p?p.modelNo:"—"}</td>
              <td>{props.role==="admin"&&<button className="btn bxs btnD" onClick={function(){props.onDelete(m.id);}}><i className="ti ti-trash" aria-hidden="true"/></button>}</td>
            </tr>);
          })}
        </tbody>
      </table></div></div>
      {sh&&<div className="ov" onClick={function(){setSh(false);}}>
        <div className="modal" onClick={function(e){e.stopPropagation();}}>
          <div className="mt_"><span>SKU Eşlemesi</span><button className="btn bsm" onClick={function(){setSh(false);}}><i className="ti ti-x" aria-hidden="true"/></button></div>
          <div className="fg"><label className="fl">Ana Ürün (SKU)</label><select value={fm.primarySku} onChange={s("primarySku")}><option value="">Seçin...</option>{props.products.map(function(p){return <option key={p.id} value={p.skuId}>{p.modelNo} — {p.skuId}</option>;})}</select></div>
          <div className="fg"><label className="fl">Eşlenecek Kodlar (virgülle)</label><input value={fm.aliases} onChange={s("aliases")} placeholder="OLD-SKU, 8690000000099"/></div>
          <div className="fxb"><button className="btn" onClick={function(){setSh(false);}}>İptal</button><button className="btn btnP" onClick={add}><i className="ti ti-check" aria-hidden="true"/>Kaydet</button></div>
        </div>
      </div>}
    </div>
  );
}

/* ── ENTEGRASYONLAR ── */
function Integrations() {
  /* Ürün sync state */
  var _ps=useState("idle"); var ps=_ps[0]; var setPs=_ps[1];
  var _perr=useState(null); var perr=_perr[0]; var setPerr=_perr[1];
  var _presult=useState(null); var presult=_presult[0]; var setPresult=_presult[1];
  var _items=useState([]); var items=_items[0]; var setItems=_items[1];
  /* Satış sync state */
  var _ss=useState("idle"); var ss=_ss[0]; var setSs=_ss[1];
  var _serr=useState(null); var serr=_serr[0]; var setSerr=_serr[1];
  var _sresult=useState(null); var sresult=_sresult[0]; var setSresult=_sresult[1];
  var _satislar=useState([]); var satislar=_satislar[0]; var setSatislar=_satislar[1];
  /* Satın alma sync state */
  var _sas=useState("idle"); var sas=_sas[0]; var setSas=_sas[1];
  var _saserr=useState(null); var saserr=_saserr[0]; var setSaserr=_saserr[1];
  var _sasresult=useState(null); var sasresult=_sasresult[0]; var setSasresult=_sasresult[1];
  /* Filtreler */
  var _tab=useState("urunler"); var tab=_tab[0]; var setTab=_tab[1];
  var _filterDate=useState(""); var filterDate=_filterDate[0]; var setFilterDate=_filterDate[1];
  var _filterCust=useState(""); var filterCust=_filterCust[0]; var setFilterCust=_filterCust[1];
  var _filterProd=useState(""); var filterProd=_filterProd[0]; var setFilterProd=_filterProd[1];

  function syncUrunler(){
    setPs("loading"); setPerr(null); setPresult(null);
    fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"syncParasut"})})
      .then(function(r){return r.json();}).then(function(res){
        if(res.ok){ setPs("done"); setPresult(res.data&&res.data.data?res.data.data:res.data); loadUrunler(); }
        else{ setPs("error"); setPerr(res.error||"Bilinmeyen hata"); }
      }).catch(function(e){ setPs("error"); setPerr("Bağlantı hatası: "+e.message); });
  }

  function syncSatinAlma(reset){
    if(reset){
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"resetParasutSatinAlmaSync"})})
        .then(function(r){return r.json();}).then(function(){ doSyncSatinAlma(); });
    } else { doSyncSatinAlma(); }
  }
  function doSyncSatinAlma(){
    setSas("loading"); setSaserr(null);
    fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"syncParasutSatinAlma"})})
      .then(function(r){return r.json();}).then(function(res){
        if(res.ok){
          var d=res.data&&res.data.data?res.data.data:res.data;
          setSasresult(d);
          setSas(d&&d.done?"done":"partial");
        } else { setSas("error"); setSaserr(res.error||"Hata"); }
      }).catch(function(e){ setSas("error"); setSaserr("Bağlantı hatası: "+e.message); });
  }

  function syncSatislar(reset){
    if(reset){
      fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"resetParasutSatisSync"})})
        .then(function(r){return r.json();}).then(function(){ doSyncSatislar(); });
    } else {
      doSyncSatislar();
    }
  }

  function doSyncSatislar(){
    setSs("loading"); setSerr(null);
    fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"syncParasutSatislar"})})
      .then(function(r){return r.json();}).then(function(res){
        if(res.ok){
          var d = res.data && res.data.data ? res.data.data : res.data;
          setSresult(d);
          setSs(d && d.done ? "done" : "partial"); // done=false ise devam var
          loadSatislar();
        } else {
          setSs("error"); setSerr(res.error||"Bilinmeyen hata");
        }
      }).catch(function(e){ setSs("error"); setSerr("Bağlantı hatası: "+e.message); });
  }

  function loadUrunler(){
    fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getParasutUrunler"})})
      .then(function(r){return r.json();}).then(function(res){ if(res.ok) setItems(res.data||[]); });
  }

  function loadSatislar(){
    fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getParasutSatislar"})})
      .then(function(r){return r.json();}).then(function(res){ if(res.ok) setSatislar(res.data||[]); });
  }

  useEffect(function(){ loadUrunler(); loadSatislar(); }, []);

  /* Filtreli satışlar — eşleştirme üzerinden SKU adı */
  var _eslMap2={}; /* Entegrasyonlar için basit isim→SKU map — loadSatislar'da doldurulur */
  var filteredSatislar = satislar.filter(function(s){
    var dateOk = !filterDate || (s.invoiceDate && s.invoiceDate.slice(0,7)===filterDate);
    var custOk = !filterCust || (s.contactName && s.contactName.toLowerCase().includes(filterCust.toLowerCase()));
    var pName = String(s.productName||"");
    var prodOk = !filterProd || pName.toLowerCase().includes(filterProd.toLowerCase()) || (String(s.productCode||"").toLowerCase().includes(filterProd.toLowerCase()));
    return dateOk && custOk && prodOk;
  });

  /* Özet hesaplamaları */
  var totalSatisRev = filteredSatislar.reduce(function(a,s){return a+(Number(s.unitPrice)||0)*(Number(s.qty)||0);},0);

  /* Ay bazında gruplama */
  var byMonth = {};
  filteredSatislar.forEach(function(s){
    var key = s.invoiceDate ? s.invoiceDate.slice(0,7) : "—";
    if(!byMonth[key]) byMonth[key]={month:key,count:0,total:0};
    byMonth[key].count++;
    byMonth[key].total += (Number(s.unitPrice)||0)*(Number(s.qty)||0);
  });
  var monthRows = Object.values(byMonth).sort(function(a,b){return a.month>b.month?-1:1;});

  /* Müşteri bazında gruplama */
  var byCustomer = {};
  filteredSatislar.forEach(function(s){
    var key = s.contactName||"—";
    if(!byCustomer[key]) byCustomer[key]={name:key,count:0,total:0};
    byCustomer[key].count++;
    byCustomer[key].total += (Number(s.unitPrice)||0)*(Number(s.qty)||0);
  });
  var custRows = Object.values(byCustomer).sort(function(a,b){return b.total-a.total;});

  /* Ürün bazında gruplama — SKU ID üzerinden */
  var byProduct = {};
  filteredSatislar.forEach(function(s){
    var pName = String(s.productName||"—");
    var key = pName; /* SKU bazında birleştirme Satış Raporları'nda yapılıyor, burada ham gösterim */
    if(!byProduct[key]) byProduct[key]={code:String(s.productCode||"—"),name:pName,qty:0,total:0};
    byProduct[key].qty += Number(s.qty)||0;
    byProduct[key].total += (Number(s.unitPrice)||0)*(Number(s.qty)||0);
  });
  var prodRows = Object.values(byProduct).sort(function(a,b){return b.total-a.total;});

  return (
    <div>
      {/* Senkronizasyon kartları */}
      <div className="g3 mb4">
        <div className="card">
          <div className="ct fx g2g"><i className="ti ti-package" style={{fontSize:15}} aria-hidden="true"/>Ürün Senkronizasyonu</div>
          <div className="infobox ibI mb3" style={{fontSize:11}}><i className="ti ti-shield-check" aria-hidden="true"/> Sadece okuma — Paraşüt verileri değiştirilmez.</div>
          <button className="btn btnP" onClick={syncUrunler} disabled={ps==="loading"} style={{width:"100%",justifyContent:"center"}}>
            <i className={"ti ti-"+(ps==="loading"?"refresh":"cloud-download")+" "+(ps==="loading"?"spin":"")} aria-hidden="true"/>
            {ps==="loading"?"Ürünler çekiliyor...":"Paraşüt'ten Ürünleri Çek"}
          </button>
          {ps==="done"&&presult&&<div className="infobox ibS mt2" style={{fontSize:11}}>✓ {presult.count||0} ürün işlendi</div>}
          {ps==="error"&&<div className="infobox ibW mt2" style={{fontSize:11}}>{perr}</div>}
        </div>
        <div className="card">
          <div className="ct fx g2g"><i className="ti ti-shopping-cart" style={{fontSize:15}} aria-hidden="true"/>Satın Alma Faturası Senkronizasyonu</div>
          <div className="infobox ibI mb3" style={{fontSize:11}}><i className="ti ti-shield-check" aria-hidden="true"/> Sadece okuma. Her seferinde ~625 fatura. Tamamlanınca maliyet tablosu otomatik hesaplanır.</div>
          <div className="fx g2g mb2" style={{flexWrap:"wrap"}}>
            <button className="btn btnP" onClick={function(){syncSatinAlma(false);}} disabled={sas==="loading"} style={{flex:1,justifyContent:"center"}}>
              <i className={"ti ti-"+(sas==="loading"?"refresh":"player-play")+" "+(sas==="loading"?"spin":"")} aria-hidden="true"/>
              {sas==="loading"?"İşleniyor...":sas==="partial"?"Devam Et":"Satın Almaları Çek"}
            </button>
            <button className="btn bxs" onClick={function(){if(confirm("Sıfırdan başlansın mı?"))syncSatinAlma(true);}} disabled={sas==="loading"}>
              <i className="ti ti-refresh" aria-hidden="true"/>Sıfırla
            </button>
          </div>
          {sas==="partial"&&sasresult&&<div className="infobox ibW mb2" style={{fontSize:11}}>Devam et butonuna basın — toplam {sasresult.totalLines||0} kalem işlendi.</div>}
          {(sas==="done"||sas==="partial")&&sasresult&&<div className="infobox ibS mb2" style={{fontSize:11}}>
            Bu batch: {sasresult.batchLines||0} kalem{sas==="done"&&<strong> — Tamamlandı, maliyet tablosu güncellendi ✓</strong>}
          </div>}
          {sas==="error"&&<div className="infobox ibW mb2" style={{fontSize:11}}>{saserr}</div>}
        </div>
        <div className="card">
          <div className="ct fx g2g"><i className="ti ti-file-invoice" style={{fontSize:15}} aria-hidden="true"/>Satış Faturası Senkronizasyonu</div>
          <div className="infobox ibI mb3" style={{fontSize:11}}><i className="ti ti-shield-check" aria-hidden="true"/> Sadece okuma. 2000+ faturada butona birden fazla basmanız gerekebilir — her seferinde ~625 fatura işlenir.</div>
          <div className="fx g2g mb2" style={{flexWrap:"wrap"}}>
            <button className="btn btnP" onClick={function(){syncSatislar(false);}} disabled={ss==="loading"} style={{flex:1,justifyContent:"center"}}>
              <i className={"ti ti-"+(ss==="loading"?"refresh":"player-play")+" "+(ss==="loading"?"spin":"")} aria-hidden="true"/>
              {ss==="loading"?"İşleniyor...":ss==="partial"?"Devam Et (Sonraki Batch)":"Paraşüt'ten Satışları Çek"}
            </button>
            <button className="btn btnD bxs" onClick={function(){if(confirm("Sıfırdan başlansın mı? Tüm çekilen satışlar temizlenir."))syncSatislar(true);}} disabled={ss==="loading"} title="Sıfırdan Başla">
              <i className="ti ti-refresh" aria-hidden="true"/>Sıfırla
            </button>
          </div>
          {ss==="partial"&&sresult&&<div className="infobox ibW mb2" style={{fontSize:11}}>
            Bu batch tamamlandı — toplam {sresult.totalLines||0} satır işlendi. Devam etmek için <strong>"Devam Et"</strong> butonuna basın.
          </div>}
          {(ss==="done"||ss==="partial")&&sresult&&<div className="infobox ibS mb2" style={{fontSize:11}}>
            Bu batch: {sresult.batchLines||0} kalem — Eklenen: {sresult.added||0}, Atlanan: {sresult.skipped||0}
            {ss==="done"&&<span> — <strong>Tüm geçmiş tamamlandı ✓</strong></span>}
          </div>}
          {ss==="error"&&<div className="infobox ibW mb2" style={{fontSize:11}}>{serr}</div>}
        </div>
      </div>

      {/* Tab seçimi */}
      <div className="tabs">
        {[["urunler","Ürünler"],["tarih","Tarih Bazlı"],["musteri","Müşteri Bazlı"],["urun","Ürün Bazlı"],["detay","Tüm Satış Detayı"]].map(function(x){return(
          <button key={x[0]} className={"tab"+(tab===x[0]?" on":"")} onClick={function(){setTab(x[0]);}}>{x[1]}</button>
        );})}
      </div>

      {/* Filtreler (satış tabları için) */}
      {tab!=="urunler"&&<div className="card mb3" style={{padding:"12px 16px"}}>
        <div className="fx g3g" style={{flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:140}}>
            <label className="fl">Ay Filtresi</label>
            <input type="month" value={filterDate} onChange={function(e){setFilterDate(e.target.value);}} style={{fontSize:12}}/>
          </div>
          <div style={{flex:1,minWidth:140}}>
            <label className="fl">Müşteri Filtresi</label>
            <input value={filterCust} onChange={function(e){setFilterCust(e.target.value);}} placeholder="Müşteri adı..." style={{fontSize:12}}/>
          </div>
          <div style={{flex:1,minWidth:140}}>
            <label className="fl">Ürün Filtresi</label>
            <input value={filterProd} onChange={function(e){setFilterProd(e.target.value);}} placeholder="Ürün adı / kodu..." style={{fontSize:12}}/>
          </div>
          <div style={{flex:"none",alignSelf:"flex-end"}}>
            <button className="btn bxs" onClick={function(){setFilterDate("");setFilterCust("");setFilterProd("");}}>Filtreleri Temizle</button>
          </div>
        </div>
        <div style={{marginTop:8,fontSize:12,color:"var(--tx2)"}}>
          {filteredSatislar.length} kayıt — Toplam: <strong>{fmtTL(totalSatisRev)}</strong>
        </div>
      </div>}

      {/* Ürünler tabı */}
      {tab==="urunler"&&<div className="card" style={{padding:0}}>
        <div className="fxb" style={{padding:"12px 16px",borderBottom:".5px solid var(--bd)"}}>
          <span style={{fontSize:13,fontWeight:500}}>Paraşüt'ten Çekilen Ürünler ({items.length})</span>
          <button className="btn bxs" onClick={loadUrunler}><i className="ti ti-refresh" aria-hidden="true"/>Yenile</button>
        </div>
        <div className="tw"><table>
          <thead><tr><th>Kod</th><th>Ad</th><th>Liste Fiyatı</th><th>Stok</th><th>Barkod</th><th>Son Senkron</th></tr></thead>
          <tbody>
            {items.length===0&&<tr><td colSpan={6}><div className="empty" style={{padding:24}}><i className="ti ti-cloud-off"/><p>Henüz veri çekilmedi.</p></div></td></tr>}
            {items.map(function(p,i){return(
              <tr key={i}>
                <td style={{fontSize:12}}>{p.code}</td>
                <td style={{fontWeight:500}}>{p.name}</td>
                <td>{p.list_price?fmtTL(p.list_price)+" "+(p.currency||""):"—"}</td>
                <td>{p.stock!==""?p.stock:"—"}</td>
                <td style={{fontSize:12}}>{p.barcode||"—"}</td>
                <td style={{fontSize:11,color:"var(--tx3)"}}>{p.updatedAt?normDate(p.updatedAt):"—"}</td>
              </tr>
            );})}
          </tbody>
        </table></div>
      </div>}

      {/* Tarih bazlı */}
      {tab==="tarih"&&<div className="card" style={{padding:0}}>
        <div style={{padding:"12px 16px",borderBottom:".5px solid var(--bd)",fontWeight:500,fontSize:13}}>Ay Bazında Satış Özeti</div>
        <div className="tw"><table>
          <thead><tr><th>Ay</th><th>Fatura Kalemi</th><th>Toplam Ciro</th></tr></thead>
          <tbody>
            {monthRows.length===0&&<tr><td colSpan={3}><div className="empty" style={{padding:20}}><p>Veri yok — önce satışları çekin.</p></div></td></tr>}
            {monthRows.map(function(m){return(
              <tr key={m.month}>
                <td style={{fontWeight:500}}>{monthLabel(m.month)}</td>
                <td>{m.count}</td>
                <td><strong>{fmtTL(m.total)}</strong></td>
              </tr>
            );})}
          </tbody>
        </table></div>
      </div>}

      {/* Müşteri bazlı */}
      {tab==="musteri"&&<div className="card" style={{padding:0}}>
        <div style={{padding:"12px 16px",borderBottom:".5px solid var(--bd)",fontWeight:500,fontSize:13}}>Müşteri Bazında Satış Özeti</div>
        <div className="tw"><table>
          <thead><tr><th>Müşteri</th><th>Fatura Kalemi</th><th>Toplam Ciro</th></tr></thead>
          <tbody>
            {custRows.length===0&&<tr><td colSpan={3}><div className="empty" style={{padding:20}}><p>Veri yok — önce satışları çekin.</p></div></td></tr>}
            {custRows.map(function(c){return(
              <tr key={c.name}>
                <td style={{fontWeight:500}}>{c.name}</td>
                <td>{c.count}</td>
                <td><strong>{fmtTL(c.total)}</strong></td>
              </tr>
            );})}
          </tbody>
        </table></div>
      </div>}

      {/* Ürün bazlı */}
      {tab==="urun"&&<div className="card" style={{padding:0}}>
        <div style={{padding:"12px 16px",borderBottom:".5px solid var(--bd)",fontWeight:500,fontSize:13}}>Ürün Bazında Satış Özeti</div>
        <div className="tw"><table>
          <thead><tr><th>Kod</th><th>Ürün</th><th>Toplam Adet</th><th>Toplam Ciro</th></tr></thead>
          <tbody>
            {prodRows.length===0&&<tr><td colSpan={4}><div className="empty" style={{padding:20}}><p>Veri yok — önce satışları çekin.</p></div></td></tr>}
            {prodRows.map(function(p){return(
              <tr key={p.code+p.name}>
                <td style={{fontSize:12}}>{p.code}</td>
                <td style={{fontWeight:500}}>{p.name}</td>
                <td>{p.qty}</td>
                <td><strong>{fmtTL(p.total)}</strong></td>
              </tr>
            );})}
          </tbody>
        </table></div>
      </div>}

      {/* Tüm detay */}
      {tab==="detay"&&<div className="card" style={{padding:0}}>
        <div style={{padding:"12px 16px",borderBottom:".5px solid var(--bd)",fontWeight:500,fontSize:13}}>Tüm Satış Fatura Kalemleri ({filteredSatislar.length})</div>
        <div className="tw"><table>
          <thead><tr><th>Fatura No</th><th>Tarih</th><th>Müşteri</th><th>Ürün</th><th>Adet</th><th>Birim Fiyat</th><th>Toplam</th></tr></thead>
          <tbody>
            {filteredSatislar.length===0&&<tr><td colSpan={7}><div className="empty" style={{padding:20}}><p>Veri yok veya filtre eşleşmiyor.</p></div></td></tr>}
            {filteredSatislar.slice(0,200).map(function(s,i){return(
              <tr key={i}>
                <td style={{fontSize:11}}>{s.invoiceNo||"—"}</td>
                <td style={{fontSize:12}}>{s.invoiceDate?s.invoiceDate.slice(0,10):"—"}</td>
                <td style={{fontSize:12}}>{s.contactName||"—"}</td>
                <td style={{fontSize:12}}>{s.productName||"—"}</td>
                <td>{s.qty}</td>
                <td>{fmtTL(s.unitPrice)}</td>
                <td><strong>{fmtTL((Number(s.unitPrice)||0)*(Number(s.qty)||0))}</strong></td>
              </tr>
            );})}
            {filteredSatislar.length>200&&<tr><td colSpan={7} style={{textAlign:"center",padding:8,fontSize:12,color:"var(--tx3)"}}>... ve {filteredSatislar.length-200} kayıt daha (filtreleyin)</td></tr>}
          </tbody>
        </table></div>
      </div>}
    </div>
  );
}

/* ── KULLANICI YÖNETİMİ ── */
function Users(props) {
  var users = props.users;
  var _sh=useState(false); var sh=_sh[0]; var setSh=_sh[1];
  var _f=useState({name:"",email:"",password:"",role:"seller"}); var fm=_f[0]; var setFm=_f[1];
  var _busy=useState(false); var busy=_busy[0]; var setBusy=_busy[1];
  function s(k){return function(e){setFm(function(f){var n=Object.assign({},f);n[k]=e.target.value;return n;});};}
  var rl={admin:"Yönetici",seller:"Satıcı",entry:"Veri Girişi"};
  function add(){
    if(!fm.name||!fm.email||!fm.password){alert("Ad, e-posta ve şifre zorunlu.");return;}
    setBusy(true);
    var newUser = Object.assign({},fm,{id:Date.now()});
    props.onAdd(newUser).then(function(){ setBusy(false); setSh(false); setFm({name:"",email:"",password:"",role:"seller"}); })
      .catch(function(){ setBusy(false); alert("Kullanıcı eklenirken hata oluştu."); });
  }
  function del(id){
    if(id===props.cur.id){alert("Kendinizi silemezsiniz.");return;}
    if(!confirm("Kullanıcı silinsin mi?"))return;
    props.onDelete(id);
  }
  return (
    <div>
      <div className="fxb mb4"><h2 style={{fontSize:15,fontWeight:500}}>Kullanıcı Yönetimi</h2><button className="btn btnP" onClick={function(){setSh(true);}}><i className="ti ti-plus" aria-hidden="true"/>Kullanıcı Ekle</button></div>
      <div className="card" style={{padding:0}}><div className="tw"><table>
        <thead><tr><th>Ad</th><th>E-posta</th><th>Rol</th><th>İzinler</th><th></th></tr></thead>
        <tbody>{users.map(function(u){return(
          <tr key={u.id} style={u.id===props.cur.id?{background:"var(--bgI)"}:{}}>
            <td><div className="fx g2g"><div className="av" style={{width:24,height:24,fontSize:10}}>{initials(u.name)}</div>{u.name}</div></td>
            <td style={{fontSize:12,color:"var(--tx2)"}}>{u.email}</td>
            <td><span className={"badge "+(u.role==="admin"?"bi":u.role==="seller"?"bs":"bw")}>{rl[u.role]}</span></td>
            <td style={{fontSize:11,color:"var(--tx2)"}}>{u.role==="admin"?"Tam Erişim":u.role==="seller"?"Görüntüleme":"Veri Girişi"}</td>
            <td>{u.id!==props.cur.id&&<button className="btn bxs btnD" onClick={function(){del(u.id);}}><i className="ti ti-trash" aria-hidden="true"/></button>}</td>
          </tr>
        );})}
        </tbody>
      </table></div></div>
      <div className="card mt3">
        <div className="ct">Rol İzin Matrisi</div>
        <div className="tw"><table>
          <thead><tr><th>Özellik</th><th>Yönetici</th><th>Satıcı</th><th>Veri Girişi</th></tr></thead>
          <tbody>{[
            ["Stok görüntüle",true,true,false],["Yeni ürün ekle",true,false,true],
            ["Stok girişi",true,false,true],["Ürün düzenle/sil",true,false,false],
            ["Müşteri yönetimi",true,true,false],["Fiyat teklifi",true,true,false],
            ["SKU eşitleme",true,false,false],["Kullanıcı yönetimi",true,false,false],
            ["Entegrasyonlar",true,false,false]
          ].map(function(r){return(
            <tr key={r[0]}><td>{r[0]}</td>{[r[1],r[2],r[3]].map(function(v,i){return <td key={i}><i className={"ti ti-"+(v?"circle-check":"circle-x")} style={{fontSize:16,color:v?"var(--txS)":"var(--bd2)"}} aria-hidden="true"/></td>;})}</tr>
          );})}
          </tbody>
        </table></div>
      </div>
      {sh&&<div className="ov" onClick={function(){setSh(false);}}>
        <div className="modal" onClick={function(e){e.stopPropagation();}}>
          <div className="mt_"><span>Yeni Kullanıcı</span><button className="btn bsm" onClick={function(){setSh(false);}}><i className="ti ti-x" aria-hidden="true"/></button></div>
          <div className="fg"><label className="fl">Ad Soyad *</label><input value={fm.name} onChange={s("name")}/></div>
          <div className="fg"><label className="fl">E-posta *</label><input type="email" value={fm.email} onChange={s("email")}/></div>
          <div className="fg"><label className="fl">Şifre *</label><input type="password" value={fm.password} onChange={s("password")}/></div>
          <div className="fg"><label className="fl">Rol</label><select value={fm.role} onChange={s("role")}><option value="admin">Yönetici</option><option value="seller">Satıcı</option><option value="entry">Veri Girişi</option></select></div>
          <div className="fxb"><button className="btn" onClick={function(){setSh(false);}}>İptal</button><button className="btn btnP" onClick={add} disabled={busy}>{busy?<i className="ti ti-refresh spin" aria-hidden="true"/>:<i className="ti ti-check" aria-hidden="true"/>}Ekle</button></div>
        </div>
      </div>}
    </div>
  );
}

/* ── ANA APP ── */
function App() {
  var _u=useState(null); var user=_u[0]; var setUser=_u[1];
  var _pg=useState("dashboard"); var page=_pg[0]; var setPage=_pg[1];

  var _loading=useState(true); var loading=_loading[0]; var setLoading=_loading[1];
  var _loadErr=useState(null); var loadErr=_loadErr[0]; var setLoadErr=_loadErr[1];
  var _syncing=useState(false); var syncing=_syncing[0]; var setSyncing=_syncing[1];

  var _pr=useState([]); var products=_pr[0]; var setProducts=_pr[1];
  var _lo=useState([]); var lots=_lo[0]; var setLots=_lo[1];
  var _sa=useState([]); var sales=_sa[0]; var setSales=_sa[1];
  var _cu=useState([]); var customers=_cu[0]; var setCustomers=_cu[1];
  var _sm=useState([]); var skuMap=_sm[0]; var setSkuMap=_sm[1];
  var _ch=useState([]); var checks=_ch[0]; var setChecks=_ch[1];
  var _us=useState([]); var allUsers=_us[0]; var setAllUsers=_us[1];
  /* Paraşüt eşleştirme ve satış verileri — Stok Listesi için */
  var _esl=useState([]); var eslestirme=_esl[0]; var setEslestirme=_esl[1];
  var _psat=useState([]); var parasutSatislar=_psat[0]; var setParasutSatislar=_psat[1];
  var _purn=useState([]); var parasutUrunler=_purn[0]; var setParasutUrunler=_purn[1];

  var _ap=useState(false); var showAP=_ap[0]; var setShowAP=_ap[1];
  var _al=useState(false); var showAL=_al[0]; var setShowAL=_al[1];
  var _ao=useState(false); var showAO=_ao[0]; var setShowAO=_ao[1];

  function loadAll(){
    setLoading(true); setLoadErr(null);
    apiGetAll().then(function(res){
      if(!res.ok){ setLoadErr("Sunucu hatası: " + (res.error||"bilinmeyen hata")); setLoading(false); return; }
      var d = res.data;
      setProducts((d.Products||[]).map(function(p){return normalizeRecord(p,["createdAt"]);}));
      setLots((d.Lots||[]).map(function(l){return normalizeRecord(l,["entryDate","expiryDate"]);}));
      setSales((d.Sales||[]).map(function(s){return normalizeRecord(s,["date","paymentDate"]);}));
      setCustomers(d.Customers||[]);
      setSkuMap(d.SkuMap||[]);
      setChecks((d.Checks||[]).map(function(c){return normalizeRecord(c,["dueDate"]);}));
      setAllUsers(d.Users||[]);
      setLoading(false);
      /* Arka planda eşleştirme + Paraşüt satışları + Paraşüt ürünlerini de çek */
      Promise.all([
        fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"get",sheet:"ParasutEslestirme"})}).then(function(r){return r.json();}),
        fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getParasutSatislar"})}).then(function(r){return r.json();}),
        fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"getParasutUrunler"})}).then(function(r){return r.json();})
      ]).then(function(results){
        if(results[0].ok) setEslestirme(results[0].data||[]);
        if(results[1].ok) setParasutSatislar(results[1].data||[]);
        if(results[2].ok) setParasutUrunler(results[2].data||[]);
      }).catch(function(){});
    }).catch(function(err){
      setLoadErr("Google Sheets API'ye bağlanılamadı. İnternet bağlantınızı kontrol edin. (" + err.message + ")");
      setLoading(false);
    });
  }

  useEffect(function(){ loadAll(); }, []);

  if(!user){
    return <Login users={allUsers} loading={loading} loadError={loadErr} onRetry={loadAll} onLogin={setUser}/>;
  }

  var rl={admin:"Yönetici",seller:"Satıcı",entry:"Veri Girişi"};
  var NAV=[
    {id:"dashboard",ico:"ti-dashboard",lbl:"Genel Durum",roles:["admin","seller","entry"]},
    {id:"stock",ico:"ti-package",lbl:"Stok Listesi",roles:["admin","seller","entry"]},
    {id:"customers",ico:"ti-users",lbl:"Müşteriler",roles:["admin","seller"]},
    {id:"payments",ico:"ti-credit-card",lbl:"Ödeme & Vade",roles:["admin","seller"]},
    {id:"raporlar",ico:"ti-report-analytics",lbl:"Satış Raporları",roles:["admin","seller"]},
    {id:"satin_alma",ico:"ti-shopping-cart",lbl:"Satın Alma Geçmişi",roles:["admin","seller"]},
    {id:"sellers",ico:"ti-chart-bar",lbl:"Satıcı Performansı",roles:["admin"]},
    {id:"eslestirme",ico:"ti-link",lbl:"Ürün Eşleştirme",roles:["admin"]},
    {id:"users",ico:"ti-user-cog",lbl:"Kullanıcılar",roles:["admin"]},
    {id:"integrations",ico:"ti-cloud",lbl:"Entegrasyonlar",roles:["admin"]}
  ].filter(function(n){return n.roles.indexOf(user.role)>=0;});
  var TITLES={dashboard:"Genel Durum",stock:"Stok Listesi",customers:"Müşteriler & Teklif",payments:"Ödeme & Vade Takibi",raporlar:"Satış Raporları",satin_alma:"Satın Alma Geçmişi",sellers:"Satıcı Performansı",sku:"SKU Eşitleme",eslestirme:"Paraşüt Ürün Eşleştirme",users:"Kullanıcı Yönetimi",integrations:"Entegrasyonlar"};

  var overdueSalesCount = sales.filter(function(s){
    if(s.paymentStatus!=="open") return false;
    var c=customers.find(function(x){return x.id===s.customerId;});
    return isOverdue(s,c);
  }).length;
  var overdueChecksCount = checks.filter(function(c){return c.status==="pending"&&daysUntil(c.dueDate)<0;}).length;
  var totalAlerts = overdueSalesCount + overdueChecksCount;

  /* ── CRUD işlemleri: hem local state hem Sheets API güncellenir ── */
  function addProduct(p){
    setSyncing(true);
    return apiAdd("Products", p).then(function(res){
      setSyncing(false);
      if(res.ok){ setProducts(function(ps){return ps.concat([p]);}); }
      else { alert("Ürün kaydedilemedi: " + (res.error||"")); }
      return res;
    }).catch(function(err){ setSyncing(false); alert("Bağlantı hatası: "+err.message); throw err; });
  }
  function updateProduct(id, changes){
    setProducts(function(ps){return ps.map(function(p){return p.id===id?Object.assign({},p,changes):p;});});
    setSyncing(true);
    apiUpdate("Products", id, changes).then(function(){setSyncing(false);}).catch(function(){setSyncing(false);});
  }
  function addLot(l){
    setSyncing(true);
    return apiAdd("Lots", l).then(function(res){
      setSyncing(false);
      if(res.ok){ setLots(function(ls){return ls.concat([l]);}); }
      else { alert("Stok girişi kaydedilemedi: " + (res.error||"")); }
      return res;
    }).catch(function(err){ setSyncing(false); alert("Bağlantı hatası: "+err.message); throw err; });
  }
  function updateLotRemaining(id, remaining){
    setLots(function(ls){return ls.map(function(l){return l.id===id?Object.assign({},l,{remaining:remaining}):l;});});
    apiUpdate("Lots", id, {remaining:remaining}).catch(function(){});
  }
  function addSale(s){
    setSyncing(true);
    return apiAdd("Sales", s).then(function(res){
      setSyncing(false);
      if(res.ok){ setSales(function(ss){return ss.concat([s]);}); }
      else { alert("Satış kaydedilemedi: " + (res.error||"")); }
      return res;
    }).catch(function(err){ setSyncing(false); alert("Bağlantı hatası: "+err.message); throw err; });
  }
  function addCustomer(c){
    setSyncing(true);
    apiAdd("Customers", c).then(function(res){
      setSyncing(false);
      if(res.ok){ setCustomers(function(cs){return cs.concat([c]);}); }
      else { alert("Müşteri kaydedilemedi: " + (res.error||"")); }
    }).catch(function(err){ setSyncing(false); alert("Bağlantı hatası: "+err.message); });
  }
  function updateCustomer(id, changes){
    setCustomers(function(cs){return cs.map(function(c){return c.id===id?Object.assign({},c,changes):c;});});
    setSyncing(true);
    apiUpdate("Customers", id, changes).then(function(){setSyncing(false);}).catch(function(){setSyncing(false);});
  }
  function addCheck(c){
    setSyncing(true);
    apiAdd("Checks", c).then(function(res){
      setSyncing(false);
      if(res.ok){ setChecks(function(cs){return cs.concat([c]);}); }
      else { alert("Çek kaydedilemedi: " + (res.error||"")); }
    }).catch(function(err){ setSyncing(false); alert("Bağlantı hatası: "+err.message); });
  }
  function updateCheck(id, changes){
    setChecks(function(cs){return cs.map(function(c){return c.id===id?Object.assign({},c,changes):c;});});
    setSyncing(true);
    apiUpdate("Checks", id, changes).then(function(){setSyncing(false);}).catch(function(){setSyncing(false);});
  }
  function addSkuMapping(m){
    setSyncing(true);
    apiAdd("SkuMap", m).then(function(res){
      setSyncing(false);
      if(res.ok){ setSkuMap(function(sm){return sm.concat([m]);}); }
      else { alert("Eşleme kaydedilemedi: " + (res.error||"")); }
    }).catch(function(err){ setSyncing(false); alert("Bağlantı hatası: "+err.message); });
  }
  function deleteSkuMapping(id){
    setSkuMap(function(sm){return sm.filter(function(x){return x.id!==id;});});
    setSyncing(true);
    apiDelete("SkuMap", id).then(function(){setSyncing(false);}).catch(function(){setSyncing(false);});
  }
  function addUser(u){
    setSyncing(true);
    return apiAdd("Users", u).then(function(res){
      setSyncing(false);
      if(res.ok){ setAllUsers(function(us){return us.concat([u]);}); }
      return res;
    }).catch(function(err){ setSyncing(false); throw err; });
  }
  function deleteUser(id){
    setAllUsers(function(us){return us.filter(function(u){return u.id!==id;});});
    setSyncing(true);
    apiDelete("Users", id).then(function(){setSyncing(false);}).catch(function(){setSyncing(false);});
  }

  /* Sipariş eklenince FIFO mantığıyla lotları da günceller */
  function handleNewOrder(s){
    return addSale(s).then(function(res){
      if(!res.ok) return;
      var remain = s.qty;
      var sorted = lots.filter(function(l){return l.productId===s.productId;}).slice().sort(function(a,b){return new Date(a.entryDate)-new Date(b.entryDate);});
      sorted.forEach(function(l){
        if(remain<=0) return;
        var take = Math.min(l.remaining, remain);
        if(take>0){
          remain -= take;
          updateLotRemaining(l.id, l.remaining-take);
        }
      });
      setShowAO(false);
    });
  }

  return (
    <div className="app">
      <nav className="sb">
        <div className="sb-logo"><h2>StokYönet</h2><small>Stok Yönetim Sistemi</small></div>
        <div className="nav-sec">Menü</div>
        {NAV.map(function(n){return(
          <button key={n.id} className={"nav-btn"+(page===n.id?" on":"")} onClick={function(){setPage(n.id);}}>
            <i className={"ti "+n.ico} aria-hidden="true"/><span>{n.lbl}</span>
            {n.id==="payments"&&totalAlerts>0&&<span className="badge bd_" style={{marginLeft:"auto",fontSize:10}}>{totalAlerts}</span>}
          </button>
        );})}
        <div style={{flex:1}}/>
        <div style={{borderTop:".5px solid var(--bd)"}}>
          <div className="uch">
            <div className="av">{initials(user.name)}</div>
            <div className="uinfo" style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
              <div style={{fontSize:11,color:"var(--tx2)"}}>{rl[user.role]}</div>
            </div>
            <button className="btn bxs" title="Çıkış" onClick={function(){setUser(null);}} style={{border:"none",padding:"4px 6px"}}><i className="ti ti-logout" aria-hidden="true"/></button>
          </div>
        </div>
      </nav>
      <main className="main">
        <div className="topbar">
          <h1>{TITLES[page]}</h1>
          <div className="fx g2g">
            {(user.role==="admin"||user.role==="seller")&&<button className="btn btnP bsm" onClick={function(){setShowAO(true);}}><i className="ti ti-plus" aria-hidden="true"/>Yeni Sipariş</button>}
            <button className="btn bsm" title="Verileri yenile" onClick={loadAll}><i className={"ti ti-refresh"+(loading?" spin":"")} aria-hidden="true"/></button>
            <span style={{fontSize:12,color:"var(--tx3)"}}>{syncing?<span className="fx g1"><i className="ti ti-cloud-upload spin" aria-hidden="true"/> Kaydediliyor...</span>:<span className="fx g1"><i className="ti ti-cloud-check" aria-hidden="true"/> Google Sheets</span>}</span>
          </div>
        </div>
        <div className="content">
          {loading&&<div className="empty" style={{padding:60}}><i className="ti ti-refresh spin"/><p>Veriler yükleniyor...</p></div>}
          {!loading&&loadErr&&<div className="infobox ibW">{loadErr} <button className="btn bxs" onClick={loadAll} style={{marginLeft:8}}>Tekrar Dene</button></div>}
          {!loading&&!loadErr&&<>
            {page==="dashboard"&&<Dashboard products={products} lots={lots} sales={sales} customers={customers}/>}
            {page==="stock"&&<StockList products={products} setProducts={setProducts} lots={lots} sales={sales} role={user.role} onAddProduct={function(){setShowAP(true);}} onAddLot={function(){setShowAL(true);}} onUpdateProduct={updateProduct} eslestirme={eslestirme} parasutSatislar={parasutSatislar} parasutUrunler={parasutUrunler}/>}
            {page==="customers"&&<Customers customers={customers} setCustomers={setCustomers} products={products} lots={lots} sales={sales} checks={checks} setChecks={setChecks} role={user.role} onAddCustomer={addCustomer} onUpdateCustomer={updateCustomer} onAddCheck={addCheck} onUpdateCheck={updateCheck}/>}
            {page==="payments"&&<PaymentTracking sales={sales} customers={customers} checks={checks} parasutSatislar={parasutSatislar}/>}
            {page==="raporlar"&&<SatisRaporlari/>}
            {page==="satin_alma"&&<SatinAlmaGecmisi/>}
            {page==="sellers"&&<SellerPerformance users={allUsers} sales={sales}/>}
            {page==="sku"&&<SkuMap products={products} skuMap={skuMap} setSkuMap={setSkuMap} role={user.role} onAdd={addSkuMapping} onDelete={deleteSkuMapping}/>}
            {page==="eslestirme"&&<EslestirmeEkrani/>}
            {page==="users"&&<Users users={allUsers} cur={user} onAdd={addUser} onDelete={deleteUser}/>}
            {page==="integrations"&&<Integrations/>}
          </>}
        </div>
      </main>
      {showAP&&<AddProd onClose={function(){setShowAP(false);}} onAdd={function(p){addProduct(p).then(function(res){if(res&&res.ok)setShowAP(false);});}}/>}
      {showAL&&<AddLot products={products} onClose={function(){setShowAL(false);}} onAdd={function(l){addLot(l).then(function(res){if(res&&res.ok)setShowAL(false);});}}/>}
      {showAO&&<NewOrderModal products={products} customers={customers} lots={lots} sales={sales} users={allUsers} currentUserId={user.id} onClose={function(){setShowAO(false);}} onAdd={handleNewOrder}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
